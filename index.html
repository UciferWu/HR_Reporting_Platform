<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR 报告平台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1e293b;color:#94a3b8;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid #334155}
.sidebar-logo .logo-title{font-size:15px;font-weight:700;color:#fff;line-height:1.3}
.sidebar-logo .logo-sub{font-size:11px;color:#64748b;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 20px 4px;font-size:11px;font-weight:600;color:#475569;letter-spacing:.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:#94a3b8;font-size:13px;transition:.15s;border-left:3px solid transparent}
.nav-item:hover{color:#e2e8f0;background:rgba(255,255,255,.05)}
.nav-item.active{color:#fff;background:rgba(37,99,235,.2);border-left-color:#2563eb}
.nav-icon{width:18px;text-align:center;font-size:15px}
.sidebar-footer{padding:12px 20px;border-top:1px solid #334155}
.main{margin-left:220px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:600;color:#1e293b}
.topbar-right{display:flex;align-items:center;gap:14px}
.week-badge{background:#eff6ff;color:#2563eb;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.user-switcher{display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;border-radius:8px;background:#f8fafc;border:1px solid #e2e8f0;font-size:13px}
.user-switcher:hover{background:#f1f5f9}
.user-dot{width:8px;height:8px;border-radius:50%}
.dot-admin{background:#2563eb}
.dot-user{background:#16a34a}
.content{padding:24px 28px;flex:1}
/* Cards */
.page-header{margin-bottom:20px}
.page-header h2{font-size:20px;font-weight:700;color:#0f172a}
.page-header p{color:#64748b;font-size:13px;margin-top:3px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid #f1f5f9}
.card-header{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600;color:#0f172a}
.card-body{padding:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
/* Stats */
.stat-card{background:#fff;border-radius:10px;padding:18px 20px;border:1px solid #f1f5f9;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;align-items:flex-start;gap:14px}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-icon.blue{background:#eff6ff}
.stat-icon.green{background:#f0fdf4}
.stat-icon.orange{background:#fff7ed}
.stat-icon.purple{background:#faf5ff}
.stat-value{font-size:24px;font-weight:700;color:#0f172a;line-height:1}
.stat-label{font-size:12px;color:#64748b;margin-top:4px}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:500}
.badge-blue{background:#eff6ff;color:#2563eb}
.badge-green{background:#f0fdf4;color:#16a34a}
.badge-orange{background:#fff7ed;color:#ea580c}
.badge-red{background:#fef2f2;color:#dc2626}
.badge-gray{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0}
/* Table */
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px;background:#f8fafc;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid #f1f5f9}
tr:hover td{background:#fafcff}
tr:last-child td{border-bottom:none}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;text-decoration:none}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#f8fafc;color:#374151;border:1px solid #e2e8f0}
.btn-secondary:hover{background:#f1f5f9}
.btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.btn-success:hover{background:#dcfce7}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Form */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px}
.form-label .req{color:#dc2626;margin-left:2px}
.form-control{width:100%;border:1px solid #d1d5db;border-radius:7px;padding:8px 12px;font-size:13px;outline:none;background:#fff;transition:.15s;color:#1e293b}
.form-control:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select.form-control{cursor:pointer}
textarea.form-control{resize:vertical;min-height:80px;font-family:inherit}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-hint{font-size:11px;color:#94a3b8;margin-top:3px}
/* Tabs */
.tabs{display:flex;border-bottom:2px solid #f1f5f9;margin-bottom:20px;gap:0}
.tab{padding:9px 18px;cursor:pointer;font-size:13px;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:500}
.tab:hover{color:#2563eb}
.tab.active{color:#2563eb;border-bottom-color:#2563eb}
/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-lg{max-width:700px}
.modal-xl{max-width:900px}
.modal-header{padding:18px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-size:15px;font-weight:600}
.modal-close{border:none;background:none;cursor:pointer;font-size:20px;color:#94a3b8;line-height:1;padding:4px}
.modal-body{padding:20px 24px}
.modal-footer{padding:14px 24px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 12px 12px}
/* Progress */
.progress-bar{background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden}
.progress-fill{background:#2563eb;height:100%;border-radius:99px;transition:.3s}
/* Toast */
.toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e293b;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;min-width:220px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:toastIn .2s ease}
.toast.success{background:#15803d}
.toast.error{background:#b91c1c}
.toast.warning{background:#c2410c}
@keyframes toastIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
/* Fields drag */
.field-list{display:flex;flex-direction:column;gap:8px}
.field-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:grab;user-select:none}
.field-item.dragging{opacity:.5;border-style:dashed}
.field-item.drag-over{border-color:#2563eb;background:#eff6ff}
.field-drag-handle{color:#94a3b8;font-size:16px;cursor:grab}
.field-name{flex:1;font-weight:500;font-size:13px}
.field-type-badge{font-size:11px;color:#64748b;background:#e2e8f0;padding:2px 7px;border-radius:4px}
/* Submission form */
.submit-form{display:flex;flex-direction:column;gap:12px}
.submit-field{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px 16px}
.submit-field-label{font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.required-dot{color:#dc2626;font-size:16px;line-height:1}
/* Report preview */
.report-preview{background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.report-a4{width:100%;padding:40px;min-height:400px;font-size:13px;line-height:1.7}
.report-a4 h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;color:#0f172a}
.report-a4 .report-meta{text-align:center;color:#64748b;font-size:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0f172a}
.report-a4 h2{font-size:15px;font-weight:700;margin:20px 0 10px;color:#0f172a;padding-bottom:6px;border-bottom:1px solid #e2e8f0}
.report-a4 h3{font-size:13px;font-weight:600;margin:12px 0 6px;color:#374151}
.report-a4 .data-table{width:100%;border-collapse:collapse;margin:8px 0 16px;font-size:12px}
.report-a4 .data-table th{background:#f8fafc;padding:7px 10px;text-align:left;font-weight:600;border:1px solid #e2e8f0;white-space:nowrap}
.report-a4 .data-table td{padding:7px 10px;border:1px solid #e2e8f0}
.report-a4 .report-footer{margin-top:32px;padding-top:12px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8;text-align:center}
.quill-editor-wrap{border:1px solid #e2e8f0;border-radius:6px;overflow:hidden}
.quill-editor-wrap .ql-toolbar{border:none;border-bottom:1px solid #e2e8f0;background:#f8fafc;padding:4px 8px}
.quill-editor-wrap .ql-toolbar .ql-formats{margin-right:8px}
.quill-editor-wrap .ql-container{border:none;font-size:13px;font-family:inherit}
.quill-editor-wrap .ql-editor{min-height:80px;padding:10px 12px;line-height:1.7}
.quill-editor-wrap.small .ql-editor{min-height:42px}
.quill-editor-wrap.disabled .ql-toolbar{display:none}
.quill-editor-wrap.disabled .ql-editor{background:#f8fafc;color:#374151;cursor:default}
.rpt-rt p{margin:2px 0}
.rpt-rt ul,.rpt-rt ol{padding-left:18px;margin:2px 0}
/* Excel-like table field */
.sxl-wrap{overflow-x:auto;border:1px solid #e2e8f0;border-radius:6px;margin-bottom:8px}
.sxl-table{border-collapse:collapse;min-width:100%;table-layout:auto}
.sxl-table thead th{background:#f1f5f9;border:1px solid #cbd5e1;padding:5px 10px;font-size:12px;font-weight:600;white-space:nowrap;min-width:100px;text-align:left;user-select:none}
.sxl-ridx-hdr{background:#f1f5f9;border:1px solid #cbd5e1;width:36px;min-width:36px;text-align:center;padding:5px 4px;font-size:12px;font-weight:400;color:#94a3b8}
.sxl-ridx{background:#f8fafc;border:1px solid #e2e8f0;width:36px;min-width:36px;text-align:center;color:#94a3b8;font-size:11px;padding:3px 4px;user-select:none}
.sxl-cell{border:1px solid #e2e8f0;padding:0;min-width:90px}
.sxl-cell input{width:100%;height:28px;border:none;padding:3px 8px;font-size:13px;outline:none;background:transparent;font-family:inherit;box-sizing:border-box}
.sxl-cell input:focus{background:#eff6ff;box-shadow:inset 0 0 0 2px #2563eb}
.sxl-bar{display:flex;align-items:center;gap:8px;margin-top:6px}
.rpt-rt strong{font-weight:600}
.progress-section{background:#f8fafc;border-radius:8px;padding:14px;margin-bottom:10px;border-left:3px solid #e2e8f0}
.progress-section.submitted{border-left-color:#16a34a}
.progress-section.draft{border-left-color:#f59e0b}
.progress-section.pending{border-left-color:#e2e8f0}
/* Checklist */
.section-select-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.section-check{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent}
.section-check:hover{background:#f8fafc;border-color:#e2e8f0}
.section-check input{cursor:pointer;width:15px;height:15px;accent-color:#2563eb}
/* Field builder palette & canvas */
.palette-chip{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:grab;margin-bottom:7px;font-size:13px;font-weight:500;user-select:none;transition:.15s;border:1.5px solid transparent}
.palette-chip:hover{filter:brightness(.96);border-color:rgba(0,0,0,.1)}
.palette-chip:active{cursor:grabbing}
.palette-chip-icon{font-size:12px;font-weight:800;min-width:24px;text-align:center;background:rgba(255,255,255,.65);border-radius:4px;padding:1px 4px;letter-spacing:-.5px}
.field-canvas{min-height:120px;border-radius:8px;transition:.2s;padding:2px 0}
.field-canvas.drag-active{background:#eff6ff;border:2px dashed #2563eb;padding:8px}
.canvas-empty{text-align:center;padding:36px 16px;color:#94a3b8;font-size:13px;border:2px dashed #e2e8f0;border-radius:8px}
.field-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;margin-bottom:8px;transition:.15s;cursor:default}
.field-row:hover{border-color:#cbd5e1;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.field-row.dragging{opacity:.35;border-style:dashed}
.field-row.drag-over{border-color:#2563eb;background:#eff6ff;border-top:2px solid #2563eb}
.field-drag-handle{color:#cbd5e1;cursor:grab;font-size:16px;flex-shrink:0;line-height:1;padding:2px 0}
.field-drag-handle:hover{color:#64748b}
.field-row-type{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;border:1px solid;white-space:nowrap;flex-shrink:0}
.field-name-input{flex:1;border:1px solid transparent;border-radius:6px;padding:5px 8px;font-size:13px;font-weight:500;color:#1e293b;background:transparent;outline:none;min-width:0;cursor:text;transition:.15s}
.field-name-input:hover{border-color:#d1d5db;background:#f8fafc}
.field-name-input:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1);cursor:text}
.req-toggle{border:1px solid #e2e8f0;background:#f8fafc;color:#94a3b8;border-radius:5px;padding:3px 9px;font-size:12px;cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0;font-family:inherit}
.req-toggle:hover{border-color:#94a3b8;color:#374151}
.req-toggle.req-on{background:#fef2f2;border-color:#fca5a5;color:#dc2626;font-weight:600}
/* Empty */
.empty-state{text-align:center;padding:48px 20px;color:#94a3b8}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:14px}
/* Log items */
.log-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.log-item:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;background:#2563eb;margin-top:5px;flex-shrink:0}
.log-content{flex:1}
.log-action{font-size:13px;color:#374151}
.log-time{font-size:11px;color:#94a3b8;margin-top:2px}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.toolbar-left{flex:1;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
/* Week selector */
.week-selector{display:flex;align-items:center;gap:8px}
.week-selector .week-nav{border:1px solid #e2e8f0;background:#fff;border-radius:6px;padding:5px 10px;cursor:pointer;color:#374151;font-size:13px}
.week-selector .week-nav:hover{background:#f8fafc}
.week-label{font-weight:600;color:#0f172a;font-size:14px;min-width:120px;text-align:center}
/* Print styles */
@media print{
  .sidebar,.topbar,.toolbar,.btn,.tab,.modal-backdrop,.toast-container{display:none!important}
  .main{margin:0}
  .content{padding:0}
  .report-a4{padding:20px;font-size:12px}
  body{background:#fff}
}

/* Login screen */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);display:flex;align-items:center;justify-content:center;z-index:9000}
.login-box{background:#fff;border-radius:16px;padding:40px;width:400px;max-width:95vw;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.login-logo{font-size:22px;font-weight:800;color:#1e293b;margin-bottom:6px}
.login-logo span{color:#2563eb}
.login-sub{font-size:13px;color:#64748b;margin-bottom:28px}
.login-tabs{display:flex;border-bottom:2px solid #f1f5f9;margin-bottom:20px}
.login-tab{padding:8px 16px;cursor:pointer;font-size:14px;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:500}
.login-tab.active{color:#2563eb;border-bottom-color:#2563eb}
/* Loading overlay */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:8000;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Template builder */
.tpl-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.15s}
.tpl-card:hover{border-color:#cbd5e1;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.tpl-card.active{border-color:#2563eb;background:#eff6ff}
.tpl-builder{display:grid;grid-template-columns:180px 1fr;gap:16px;min-height:300px}
.builder-palette{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:6px}
.builder-canvas{background:#f8fafc;border:2px dashed #cbd5e1;border-radius:8px;padding:14px;min-height:260px;display:flex;flex-direction:column;gap:8px;transition:.2s}
.builder-canvas:hover{border-color:#94a3b8}
.palette-item{background:#fff;border:1px solid #e2e8f0;border-radius:7px;padding:8px 12px;cursor:grab;font-size:12px;font-weight:500;text-align:center;user-select:none;transition:.15s}
.palette-item:hover{background:#eff6ff;border-color:#2563eb;color:#2563eb}
.palette-item:active{cursor:grabbing}
.canvas-placeholder{color:#94a3b8;font-size:12px;text-align:center;padding:40px 16px;border:2px dashed #d1d5db;border-radius:8px;flex:1}
.field-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;user-select:none;transition:.15s;cursor:default}
.field-card:hover{border-color:#94a3b8;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.field-card.drag-over{border-color:#2563eb;background:#eff6ff;border-top:2px solid #2563eb}
.field-card-header{display:flex;align-items:center;gap:8px}
.drag-handle{color:#cbd5e1;cursor:grab;font-size:18px;flex-shrink:0;padding:0 2px;line-height:1}
.drag-handle:hover{color:#64748b}
.field-item-ro{background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:9px 14px;margin-bottom:7px;font-size:13px}
/* Report */
.report-page{padding:0}
.report-header{text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #2563eb}
.report-title{font-size:20px;font-weight:700;color:#1e293b;margin-bottom:4px}
.report-subtitle{color:#64748b;font-size:13px;margin-top:4px}
.report-meta{color:#94a3b8;font-size:12px;margin-top:4px}
.report-footer{text-align:center;margin-top:20px;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:10px}
.report-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;border:2px solid #1e3a8a}
.report-table th{background:#1e40af;color:#fff;padding:8px 10px;text-align:left;font-weight:600;border:1px solid #1e3a8a;white-space:nowrap}
.report-table td{padding:8px 10px;border:1px solid #94a3b8;vertical-align:top}
.report-table tr:nth-child(even) td{background:#f0f5ff}
/* Misc */
.req{color:#dc2626;margin-left:2px}
.login-card{background:#fff;border-radius:12px;padding:32px;max-width:420px;width:100%}

    @page{size:A4 landscape;margin:15mm}

<script>

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
window.onerror = (msg, src, line, col, err) => { console.error('Global error:', msg, 'at', line+':'+col); };

// ============================================================
// STATE
// ============================================================
let state = { users:[], sections:[], templates:[], submissions:[], operationLogs:[], emailList:[] };
let appVisible = false;
let currentUserId = null;
let currentLoginTab = 'signin';

function currentUser() {
  return state.users.find(u => u.id === currentUserId) || { id:currentUserId, name:'用户', role:'member', sections:[], status:'active' };
}

function roleLabel(role) {

// ============================================================
function switchLoginTab(tab, el) {
  currentLoginTab = tab;
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const nameGroup = document.getElementById('auth_name_group');
  const btn = document.getElementById('authBtn');
  if (nameGroup) nameGroup.style.display = tab === 'signup' ? '' : 'none';
  if (btn) btn.textContent = tab === 'signup' ? '注册' : '登录';
  document.getElementById('auth_msg').textContent = '';
  hideResetForm();
}

function showResetForm() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('resetForm').style.display = '';
  document.getElementById('newPwdForm').style.display = 'none';
  document.querySelectorAll('.login-tab').forEach(t=>t.style.display='none');
  document.getElementById('reset_msg').textContent = '';
  document.getElementById('reset_email').value = document.getElementById('auth_email')?.value || '';
}

function hideResetForm() {
  document.getElementById('loginForm').style.display = '';
  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('newPwdForm').style.display = 'none';
  document.querySelectorAll('.login-tab').forEach(t=>t.style.display='');
}

async function doSendReset() {
  const email = document.getElementById('reset_email')?.value.trim();
  const msgEl = document.getElementById('reset_msg');
  if (!email) { msgEl.style.color='#dc2626'; msgEl.textContent='请输入邮箱'; return; }
  const btn = document.getElementById('resetBtn');
  btn.disabled=true; btn.textContent='发送中…';
  const redirectTo = window.location.origin + window.location.pathname;
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
  if (error) {
    msgEl.style.color='#dc2626'; msgEl.textContent='发送失败：'+error.message;
    btn.disabled=false; btn.textContent='发送重置邮件';
  } else {
    msgEl.style.color='#16a34a'; msgEl.textContent='重置邮件已发送，请查收邮箱并点击链接。';
    btn.disabled=false; btn.textContent='重新发送';
  }
}

async function doUpdatePassword() {
  const pwd = document.getElementById('new_pwd')?.value;
  const pwd2 = document.getElementById('new_pwd2')?.value;
  const msgEl = document.getElementById('newpwd_msg');
  if (!pwd || pwd.length < 6) { msgEl.style.color='#dc2626'; msgEl.textContent='密码至少 6 位'; return; }
  if (pwd !== pwd2) { msgEl.style.color='#dc2626'; msgEl.textContent='两次密码不一致'; return; }
  const btn = document.getElementById('newPwdBtn');
  btn.disabled=true; btn.textContent='提交中…';
  const { error } = await sb.auth.updateUser({ password: pwd });
  if (error) {
    msgEl.style.color='#dc2626'; msgEl.textContent='修改失败：'+error.message;
    btn.disabled=false; btn.textContent='确认修改密码';
  } else {
    msgEl.style.color='#16a34a'; msgEl.textContent='密码修改成功！正在跳转登录…';
    setTimeout(()=>{ sb.auth.signOut(); hideResetForm(); }, 1500);
  }
}

async function doAuth() {
  const email = document.getElementById('auth_email')?.value.trim();
  const password = document.getElementById('auth_password')?.value;
  const name = document.getElementById('auth_name')?.value.trim();
  const msgEl = document.getElementById('auth_msg');
  if (!email || !password) { msgEl.textContent = '请填写邮箱和密码'; return; }

  const btn = document.getElementById('authBtn');
  btn.disabled = true; btn.textContent = '处理中…';

  let error;
  if (currentLoginTab === 'signup') {
    if (!name) { msgEl.textContent = '请填写姓名'; btn.disabled=false; btn.textContent='注册'; return; }
    const allowedDomains = ['winninggroup.com.sg', 'winninggroup.net', 'winningafrica.net'];
    const emailDomain = email.split('@')[1]?.toLowerCase() || '';
    if (!allowedDomains.includes(emailDomain)) {
      msgEl.style.color='#dc2626';
      msgEl.textContent = '仅限 @winninggroup.com.sg、@winninggroup.net 或 @winningafrica.net 邮箱注册';
      btn.disabled=false; btn.textContent='注册'; return;
    }
    const res = await sb.auth.signUp({ email, password, options:{ data:{ name } } });
    error = res.error;
    if (!error) { msgEl.style.color='#16a34a'; msgEl.textContent = '注册成功！请查收验证邮件后登录。'; btn.disabled=false; btn.textContent='注册'; return; }
  } else {
    const res = await sb.auth.signInWithPassword({ email, password });
    error = res.error;
  }

  if (error) {
    msgEl.style.color='#dc2626';
    msgEl.textContent = error.message.includes('Invalid login') ? '邮箱或密码错误' :
                        error.message.includes('Email not confirmed') ? '请先验证邮箱后再登录' : error.message;
    btn.disabled=false; btn.textContent = currentLoginTab==='signup'?'注册':'登录';
  }
}

async function doLogout() {
  await sb.auth.signOut();
  state = { users:[], sections:[], templates:[], submissions:[], operationLogs:[], emailList:[] };
  currentUserId = null;
  showLogin();
}

function showLogin() {
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('appLayout').style.display = 'none';
  appVisible = false;
  const btn = document.getElementById('authBtn');
  if (btn) { btn.disabled = false; btn.textContent = currentLoginTab === 'signup' ? '注册' : '登录'; }
}

async function showApp(userId) {
  currentUserId = userId;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appLayout').style.display = '';
  appVisible = true;
  await loadAllData();
  updateTopbar();
  navigate('overview');
}

let appLoading = false;

function forceLogout(msg) {
  appVisible = false; appLoading = false;
  // 不 await signOut——网络有问题时 signOut 本身也会挂住
  // 直接清掉本地所有 Supabase session 数据，彻底断开
  try {
    Object.keys(localStorage)
      .filter(k => k.startsWith('sb-'))
      .forEach(k => localStorage.removeItem(k));
  } catch(e) {}
  // 后台尝试服务端签出，失败不影响 UI
  sb.auth.signOut().catch(() => {});
  hideLoading();
  showLogin();
  if (msg) setTimeout(() => toast(msg, 'error'), 100);
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'INITIAL_SESSION') {
    if (!session) { showLogin(); return; }

    // 检查 access token 是否过期
    const expiresAt = (session.expires_at || 0) * 1000;
    const isExpired = expiresAt > 0 && Date.now() > expiresAt;

    if (isExpired) {
      console.log('[HR] access token expired, trying refresh...');
      let refreshOk = false;
      try {
        const result = await Promise.race([
          sb.auth.refreshSession(),
          new Promise(res => setTimeout(() => res({ error: { message: 'timeout' }, data: {} }), 5000))
        ]);
        if (!result.error && result.data?.session) {
          session = result.data.session;
          refreshOk = true;
          console.log('[HR] token refreshed ok');
        } else {
          console.warn('[HR] refresh failed:', result.error?.message);
        }
      } catch(e) {
        console.warn('[HR] refresh error:', e.message);
      }
      if (!refreshOk) {
        forceLogout('登录已过期，请重新登录');
        return;
      }
    }

    if (!appVisible && !appLoading) {
      appLoading = true;
      await showApp(session.user.id);
      appLoading = false;
    }
  } else if (event === 'SIGNED_IN' && session) {
    if (!appVisible && !appLoading) {
      appLoading = true;
      await showApp(session.user.id);
      appLoading = false;
    }
  } else if (event === 'PASSWORD_RECOVERY') {
    // 用户点击重置邮件链接后回到页面，显示设置新密码表单
    document.getElementById('loginScreen').style.display = '';
    document.getElementById('appLayout').style.display = 'none';
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('newPwdForm').style.display = '';
    document.querySelectorAll('.login-tab').forEach(t=>t.style.display='none');
    appVisible = false; appLoading = false;
  } else if (event === 'SIGNED_OUT') {
    appVisible = false; appLoading = false;
    showLogin();
  }
});

// ============================================================
// DATA LOADING
// ============================================================
function showLoading(msg='正在加载数据…') {
  const el = document.getElementById('loadingOverlay');
  if (el) { el.style.display='flex'; document.getElementById('loadingMsg').textContent=msg; }
}
function hideLoading() {
  const el = document.getElementById('loadingOverlay');
  if (el) el.style.display='none';
}

async function loadAllData() {
  showLoading();
  const safetyTimer = setTimeout(()=>{
    console.warn('[HR] loadAllData timeout!');
    forceLogout('数据加载超时，可能是登录已过期，请重新登录');
  }, 15000);

  // 带超时的单表查询：超时返回空数据，不阻塞其他查询
  async function q(name, fn, timeoutMs=8000) {
    console.log('[HR] querying:', name);
    try {
      const race = await Promise.race([
        fn(),
        new Promise(res=>setTimeout(()=>res({data:[],error:{message:'timeout'}}), timeoutMs))
      ]);
      if (race.error && race.error.message!=='timeout') console.warn('[HR]', name, 'error:', race.error.message);
      else if (race.error) console.warn('[HR]', name, 'timed out — using empty data');
      else console.log('[HR]', name, 'ok, rows:', race.data?.length);
      return race;
    } catch(e) {
      console.warn('[HR]', name, 'exception:', e.message);
      return {data:[], error:e};
    }
  }

  try {
    console.log('[HR] loadAllData start, userId:', currentUserId);

    const [myProfRes, secRes, profRes, uSecRes, tplRes, tfRes, tsRes, subRes, sdRes, logRes] = await Promise.all([
      q('my_profile',       ()=>sb.from('profiles').select('*').eq('id',currentUserId).single()),
      q('sections',         ()=>sb.from('sections').select('*').order('sort_order')),
      q('profiles',         ()=>sb.from('profiles').select('*')),
      q('user_sections',    ()=>sb.from('user_sections').select('*')),
      q('templates',        ()=>sb.from('templates').select('*')),
      q('template_fields',  ()=>sb.from('template_fields').select('*').order('sort_order')),
      q('template_sections',()=>sb.from('template_sections').select('*')),
      q('submissions',      ()=>sb.from('submissions').select('*').order('week_no',{ascending:false})),
      q('submission_data',  ()=>sb.from('submission_data').select('*')),
      q('operation_logs',   ()=>sb.from('operation_logs').select('*').order('created_at',{ascending:false}).limit(100)),
    ]);

    const myProfile = myProfRes.data;

    state.sections = (secRes.data||[]).map(s=>({
      id:s.id, name:s.name, head:s.head||'', order:s.sort_order, status:s.status
    }));

    const userSections = uSecRes.data||[];
    let profiles = profRes.data||[];
    if (myProfile && !profiles.find(p=>p.id===currentUserId)) profiles=[myProfile,...profiles];
    else if (myProfile) profiles=profiles.map(p=>p.id===currentUserId?myProfile:p);
    state.users = profiles.map(p=>({
      id:p.id, name:p.name, account:p.id, role:p.role, status:p.status,
      email: p.email||'',
      sections: userSections.filter(us=>us.user_id===p.id).map(us=>us.section_id)
    }));

    const allFields=tfRes.data||[], allTplSecs=tsRes.data||[];
    state.templates = (tplRes.data||[]).map(t=>({

      validStart:t.valid_start||'', validEnd:t.valid_end||'',
      sections: allTplSecs.filter(ts=>ts.template_id===t.id).map(ts=>ts.section_id),
      fields: allFields.filter(f=>f.template_id===t.id).sort((a,b)=>a.sort_order-b.sort_order).map(f=>({
        id:f.id, name:f.name, type:f.field_type, required:f.required,
        order:f.sort_order, hint:f.hint||'', options:f.options||'',

      }))
    }));

    const allSubData=sdRes.data||[];
    state.submissions = (subRes.data||[]).map(s=>({
      id:s.id, weekNo:s.week_no, weekLabel:s.week_label, weekStart:s.week_start, weekEnd:s.week_end,

    }));

    }));
    state.emailList = [];
    console.log('[HR] loadAllData complete');

  } catch(e) {

  }

async function dbRun(fn) {
  const { error } = await fn();
  if (error) { toast('保存失败：'+error.message, 'error'); return false; }
  return true;
}

async function dbAddSection(name, head, order) {

  return data;
}

  if (updates.head !== undefined) map.head = updates.head;
  if (updates.sort_order !== undefined) map.sort_order = updates.sort_order;
  await dbRun(()=>sb.from('sections').update(map).eq('id',id));
}

async function dbUpsertSubmission(subData, fieldValues, template) {
  // Upsert submission row (don't pass local placeholder IDs to Supabase)
  const isRealId = subData.id && !String(subData.id).startsWith('local_');
  const upsertRow = {
    week_no:subData.weekNo, week_label:subData.weekLabel,
    week_start:subData.weekStart, week_end:subData.weekEnd,
    section_id:subData.sectionId, template_id:subData.templateId,
    user_id:subData.userId, status:subData.status,
    updated_at: new Date().toISOString()
  };
  if (isRealId) upsertRow.id = subData.id;
  const { data: sub, error } = await sb.from('submissions').upsert(upsertRow, {onConflict:'week_no,section_id,template_id'}).select().single();
  if (error) { toast('提报保存失败：'+error.message,'error'); return null; }
  // Update local id in case it was a new insert
  subData.id = sub.id;
  // Upsert field data rows
  const rows = template.fields.map(f=>({
    submission_id: sub.id, field_id:f.id, field_name:f.name,
    value: fieldValues[f.id]||''
  }));
  if (rows.length) {
    await sb.from('submission_data').upsert(rows, {onConflict:'submission_id,field_id'});
  }
  return sub;
}

function getWeekInfo(weeksAgo=0) {
  const now = new Date(); now.setDate(now.getDate()-weeksAgo*7);
  const d = new Date(now); d.setHours(0,0,0,0); d.setDate(d.getDate()-(d.getDay()+6)%7);
  const year = d.getFullYear();
  const startOfYear = new Date(year,0,1);
  const weekNo = Math.ceil(((d-startOfYear)/86400000+startOfYear.getDay()+1)/7);
  const end = new Date(d); end.setDate(d.getDate()+6);
  return { weekNo:`${year}-W${String(weekNo).padStart(2,'0')}`, label:`${year}年第${weekNo}周`,
           start:d.toISOString().split('T')[0], end:end.toISOString().split('T')[0] };
}
function getWeekInfoFromNo(weekNo) {
  const [year,week] = weekNo.split('-W').map(Number);
  const jan1 = new Date(year,0,1);
  const daysToMonday = (8-jan1.getDay())%7;
  const firstMonday = new Date(jan1); firstMonday.setDate(jan1.getDate()+daysToMonday);
  const start = new Date(firstMonday); start.setDate(firstMonday.getDate()+(week-1)*7);
  const end = new Date(start); end.setDate(start.getDate()+6);
  return { label:`${year}年第${week}周`, start:start.toISOString().split('T')[0], end:end.toISOString().split('T')[0] };
}
function getAllWeeks() { const w=[]; for(let i=12;i>=0;i--) w.push(getWeekInfo(i)); return w; }

function isTemplateActive(t, dateStr) {
  if (t.status !== 'active') return false;
  const d = dateStr || new Date().toISOString().split('T')[0];
  if (t.validStart && d < t.validStart) return false;
  if (t.validEnd && d > t.validEnd) return false;
  return true;
}

function isWeekRequired(template, weekEndStr) {
  const cycle = template.cycleType || 'weekly';
  if (cycle === 'weekly') return true;
  const end = new Date(weekEndStr);
  const nextDay = new Date(end); nextDay.setDate(end.getDate() + 1);
  const isLastWeekOfMonth = nextDay.getMonth() !== end.getMonth();
  if (cycle === 'biweekly') {
    const jan1 = new Date(end.getFullYear(), 0, 1);
    const weekNum = Math.ceil(((end - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    return weekNum % 2 === 1;
  }
  if (cycle === 'monthly') return isLastWeekOfMonth;
  if (cycle === 'quarterly') {
    const mo = end.getMonth() + 1; // 1-12
    return isLastWeekOfMonth && [3, 6, 9, 12].includes(mo);
  }
  return true;
}

function renderSubForm(wi) {

  const allTpls = state.templates.filter(t=>isTemplateActive(t, wi.end)&&t.sections.includes(subSectionId));
  if (!allTpls.length) { area.innerHTML='<div class="card"><div class="card-body"><div class="empty-state"><p>该板块暂无绑定模板</p></div></div></div>'; return; }

  const template = allTpls.find(t=>t.id===subTplId);

  // Cycle check
  const cycleRequired = isWeekRequired(template, wi.end);

  const existing = state.submissions.find(s=>s.weekNo===wi.weekNo&&s.sectionId===subSectionId&&s.templateId===subTplId);
  const lastWeek = state.submissions.find(s=>s.sectionId===subSectionId&&s.templateId===subTplId&&s.status==='submitted'&&s.weekNo!==wi.weekNo);
  const isViewer = u.role==='viewer';
  const data = existing ? {...existing.data} : {};
  const fields = [...template.fields].sort((a,b)=>a.order-b.order);

  // Tabs HTML (only shown when >1 template)
  const tabsHtml = allTpls.length > 1 ? `<div class="tabs" style="margin-bottom:0;border-bottom:2px solid #f1f5f9">
    ${allTpls.map(t=>{
      const req = isWeekRequired(t, wi.end);
      const sub = state.submissions.find(s=>s.weekNo===wi.weekNo&&s.sectionId===subSectionId&&s.templateId===t.id);
      const dot = sub ? (sub.status==='submitted'?'🟢':'🟡') : (req?'⚪':'➖');
      return `<div class="tab ${t.id===subTplId?'active':''}" onclick="subTplId='${t.id}';renderSubForm(getWeekInfo(subWeekOffset))">${dot} ${t.name}</div>`;
    }).join('')}
  </div>` : '';

  let formBody = '';
  if (!cycleRequired) {
    const cycleLabels = {weekly:'每周',biweekly:'每两周',monthly:'每月',quarterly:'每季度'};
    formBody = `<div class="empty-state" style="padding:32px 0"><div class="empty-icon">📅</div><p style="color:#64748b">本周无需填报</p><p style="font-size:12px;color:#94a3b8">该模板周期为「${cycleLabels[template.cycleType]||template.cycleType}」</p></div>`;
  } else {
    let fieldsHtml = fields.map(f => {
      const val = data[f.id]||'';
      const dis = isViewer?'disabled':'';
      let input = '';
      if (f.type==='calculated') {
        const calcVal = evalFormula(f.formula, data);
        input=`<div class="form-control" id="sf_${f.id}" style="background:#f8fafc;color:#374151">${formatFieldValue(calcVal===''?'-':calcVal, f.numberFormat)} <span style="font-size:11px;color:#94a3b8">（自动计算）</span></div>`;
      } else if (f.type==='number') input=`<input type="number" class="form-control" id="sf_${f.id}" value="${val}" min="0" oninput="liveCalc('${template.id}')" ${dis}>`;
      else if (f.type==='textarea') input=`<div class="quill-editor-wrap ${isViewer?'disabled':''}" id="qwrap_${f.id}"><div id="sf_quill_${f.id}" data-fid="${f.id}" data-enc="${encodeURIComponent(val)}" data-disabled="${isViewer}"></div></div>`;
      else if (f.type==='select') {
        const opts=(f.options||'').split(',').map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('');
        input=`<select class="form-control" id="sf_${f.id}" ${dis}><option value="">请选择</option>${opts}</select>`;
      } else if (f.type==='table') {
        const cols=(f.options||'').split(',').map(c=>c.trim()).filter(Boolean);
        if(!cols.length){
          input=`<div style="color:#94a3b8;font-size:13px;padding:10px;border:1px dashed #e2e8f0;border-radius:6px">请先在模板配置中设置表格列名</div>`;
        } else {
          let rows=[];try{rows=JSON.parse(val||'[]');}catch(e){}
          if(!rows.length)rows=[new Array(cols.length).fill('')];
          const colCount=cols.length;

  area.innerHTML = `<div class="card">

function copyLastWeek(subId) {
  const sub = state.submissions.find(s=>s.id===subId); if(!sub) return;
  const template = state.templates.find(t=>t.id===sub.templateId); if(!template) return;
  template.fields.forEach(f=>{
    if(f.type==='text'||f.type==='textarea'){ const qi=quillInstances[f.id]; if(qi&&sub.data[f.id]!==undefined) qi.root.innerHTML=sub.data[f.id]||''; }
    else { const el=document.getElementById('sf_'+f.id); if(el&&sub.data[f.id]!==undefined) el.value=sub.data[f.id]; }
  });
  toast('已复制上周数据，请核对后提交','success');
}

async function saveSubmission(status, weekNo, weekStart, weekEnd, weekLabel, tplId) {
  const u = currentUser();
  const tid = tplId || subTplId;
  const template = state.templates.find(t=>t.id===tid);
  if (!template) return;
  const data = {};
  let missingRequired = false;
  template.fields.forEach(f=>{
    if(f.type==='calculated') return;
    if(f.type==='text'||f.type==='textarea'){
      const qi=quillInstances[f.id];
      if(qi){ const txt=qi.getText().trim(); const html=txt?qi.root.innerHTML:''; data[f.id]=html; if(f.required&&!txt&&status==='submitted') missingRequired=true; }
    } else if(f.type==='table'){
      const tbody=document.getElementById('sf_tbl_'+f.id);
      if(tbody){
        const rows=[...tbody.querySelectorAll('tr')].map(tr=>[...tr.querySelectorAll('input')].map(inp=>inp.value.trim()));
        data[f.id]=JSON.stringify(rows);
        if(f.required&&rows.every(r=>r.every(c=>!c))&&status==='submitted') missingRequired=true;
      }
    } else {
      const el=document.getElementById('sf_'+f.id); if(el){ data[f.id]=el.value.trim(); if(f.required&&!data[f.id]&&status==='submitted') missingRequired=true; }
    }
  });
  if (missingRequired) { toast('请填写所有必填项（标*字段）','error'); return; }

  const existing = state.submissions.find(s=>s.weekNo===weekNo&&s.sectionId===subSectionId&&s.templateId===tid);
  const subRecord = existing
    ? existing
    : { id:'local_'+Date.now(), weekNo, weekLabel, weekStart, weekEnd, sectionId:subSectionId, templateId:tid, userId:u.id, status, data, updatedAt:new Date().toISOString() };
  subRecord.status = status; subRecord.data = data; subRecord.updatedAt = new Date().toISOString();
  if (!existing) state.submissions.push(subRecord);

  const saved = await dbUpsertSubmission(subRecord, data, template);
  if (saved) {
    subRecord.id = saved.id;
    addLog(u.id, status==='submitted'?'提交周报':'保存草稿', `${state.sections.find(s=>s.id===subSectionId)?.name} ${weekLabel}`);
    toast(status==='submitted'?'提交成功 ✅':'草稿已保存','success');
    renderSubForm(getWeekInfo(subWeekOffset));
  }
}

function copyLastWeekTpl(subId, tplId) {
  const sub = state.submissions.find(s=>s.id===subId); if(!sub) return;
  const template = state.templates.find(t=>t.id===tplId); if(!template) return;
  template.fields.forEach(f=>{
    if(f.type==='table'){
      const tbody=document.getElementById('sf_tbl_'+f.id);
      if(tbody&&sub.data[f.id]){
        try{
          const rows=JSON.parse(sub.data[f.id]);
          const cols=(f.options||'').split(',').map(c=>c.trim()).filter(Boolean);
          if(!cols.length||!rows.length)return;
          tbody.innerHTML=rows.map((row,ri)=>{
            const cells=cols.map((_,ci)=>`<td class="sxl-cell"><input type="text" value="${(row[ci]||'').replace(/"/g,'&quot;')}" onkeydown="sxlKeyNav(event)" onpaste="sxlHandlePaste(event)"></td>`).join('');
            return `<tr><td class="sxl-ridx">${ri+1}</td>${cells}</tr>`;
          }).join('');
        }catch(e){}
      }
    } else {
      const el=document.getElementById('sf_'+f.id); if(el&&sub.data[f.id]!==undefined) el.value=sub.data[f.id];
    }
  });
  toast('已复制上周数据，请核对后提交','success');
}
function liveCalc(tid) {
  const tpl = state.templates.find(t=>t.id===tid); if(!tpl) return;
  const data = {};
  tpl.fields.forEach(f=>{
    if(f.type!=='calculated') { const el=document.getElementById('sf_'+f.id); if(el) data[f.id]=el.value; }
  });
  tpl.fields.filter(f=>f.type==='calculated').forEach(f=>{
    const el=document.getElementById('sf_'+f.id); if(!el) return;
    const v=evalFormula(f.formula, data);
    el.innerHTML=formatFieldValue(v===''?'-':v, f.numberFormat)+' <span style="font-size:11px;color:#94a3b8">（自动计算）</span>';
  });
}

async function moveSectionOrder(sid, dir) {
  const sorted = [...state.sections].sort((a,b)=>a.order-b.order);
  const idx = sorted.findIndex(s=>s.id===sid);
  if (idx<0) return;
  const swapIdx = idx+dir;
  if (swapIdx<0||swapIdx>=sorted.length) return;
  const a = sorted[idx], b = sorted[swapIdx];
  const tmpOrder = a.order;
  a.order = b.order; b.order = tmpOrder;
  await Promise.all([
    dbUpdateSection(a.id,{sort_order:a.order}),
    dbUpdateSection(b.id,{sort_order:b.order})
  ]);
  renderAdminSections(document.getElementById('adminTabContent'));
}

function getOrderedTemplates() {
  const ids = tplOrder.filter(id=>state.templates.some(t=>t.id===id));
  const rest = state.templates.filter(t=>!ids.includes(t.id)).map(t=>t.id);
  return [...ids,...rest].map(id=>state.templates.find(t=>t.id===id)).filter(Boolean);
}
function saveTplOrder() {
  localStorage.setItem('hr_tpl_order', JSON.stringify(tplOrder));
}
function moveTpl(id, dir) {
  const ordered = getOrderedTemplates().map(t=>t.id);
  const i = ordered.indexOf(id);
  if (dir===-1 && i>0) { [ordered[i-1],ordered[i]]=[ordered[i],ordered[i-1]]; }
  else if (dir===1 && i<ordered.length-1) { [ordered[i],ordered[i+1]]=[ordered[i+1],ordered[i]]; }
  tplOrder = ordered;
  saveTplOrder();
  renderTplList();
}

        <option value="decimal1" ${f.numberFormat==='decimal1'?'selected':''}>保留1位小数</option>
        <option value="decimal2" ${f.numberFormat==='decimal2'?'selected':''}>保留2位小数</option>
        <option value="thousands" ${f.numberFormat==='thousands'?'selected':''}>千分位</option>
        <option value="percent" ${f.numberFormat==='percent'?'selected':''}>百分比（%）</option>
        <option value="currency" ${f.numberFormat==='currency'?'selected':''}>货币（¥）</option>
      </select>
    </div>` : '';

  const numFields = tpl ? tpl.fields.filter(fi=>fi.id!==f.id&&(fi.type==='number'||fi.type==='calculated')) : [];
  const formulaHtml = f.type==='calculated' ? `
    <div style="margin-top:8px">
      <div style="font-size:11px;color:#64748b;margin-bottom:4px">计算公式：</div>
      <div id="fml_${f.id}" style="min-height:32px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:6px 10px;font-size:12px;margin-bottom:6px;word-break:break-all">

      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">
        ${numFields.map(fi=>`<button class="btn btn-secondary btn-sm" style="font-size:11px;padding:2px 7px" onclick="addToFormula('${f.id}','${tid}',{t:'f',id:'${fi.id}',name:'${fi.name.replace(/'/g,"\\'")}'})">${fi.name}</button>`).join('')}
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${['+','-','×','÷','(',')'].map(op=>`<button class="btn btn-secondary btn-sm" style="font-size:13px;padding:2px 8px;font-weight:600" onclick="addToFormula('${f.id}','${tid}',{t:'o',v:'${op==='×'?'*':op==='÷'?'/':op}'})">${op}</button>`).join('')}
        <button class="btn btn-danger btn-sm" style="font-size:11px" onclick="clearFormula('${f.id}','${tid}')">清空</button>

    </div>` : '';

    <div class="field-card-header">
      <div class="drag-handle">⣿</div>
      <input class="field-name-input" id="fn_${f.id}" value="${f.name}" placeholder="字段名称" onblur="saveFieldName('${f.id}','${tid}')">

    </div>

    ${f.type==='table'?`<div style="margin-top:8px"><input class="form-control" style="font-size:12px" placeholder="列名（逗号分隔，如：姓名,部门,人数）" value="${f.options||''}" onblur="saveFieldOptions('${f.id}','${tid}',this.value)"><div style="font-size:11px;color:#94a3b8;margin-top:3px">填写表格的列标题，用英文逗号分隔</div></div>`:''}

function renderFormulaDisplay(formula) {
  if (!formula) return '<span style="color:#94a3b8">点击下方字段和运算符构建公式</span>';
  try {
    const parts = JSON.parse(formula);
    return parts.map(p => p.t==='f' ? `<span style="background:#dbeafe;color:#1e40af;border-radius:4px;padding:1px 5px">${p.name}</span>` : `<strong>${p.v==='*'?'×':p.v==='/'?'÷':p.v}</strong>`).join(' ');
  } catch(e) { return formula; }
}

async function addToFormula(fid, tid, part) {
  const t = state.templates.find(t=>t.id===tid);
  const f = t?.fields.find(f=>f.id===fid); if(!f) return;
  let parts = [];
  try { parts = JSON.parse(f.formula||'[]'); } catch(e) {}
  parts.push(part);
  f.formula = JSON.stringify(parts);
  document.getElementById('fml_'+fid).innerHTML = renderFormulaDisplay(f.formula);
  await dbUpdateField(fid, {formula: f.formula});
}

async function clearFormula(fid, tid) {
  const t = state.templates.find(t=>t.id===tid);
  const f = t?.fields.find(f=>f.id===fid); if(!f) return;
  f.formula = '';
  document.getElementById('fml_'+fid).innerHTML = renderFormulaDisplay('');
  await dbUpdateField(fid, {formula: null});
}

async function saveFieldFormat(fid, tid, val) {
  const t = state.templates.find(t=>t.id===tid);
  const f = t?.fields.find(f=>f.id===fid); if(!f) return;
  f.numberFormat = val;
  await dbUpdateField(fid, {numberFormat: val});
}

// Drag-and-drop field builder
let dragFieldType=null, dragFieldId=null, dragFieldTid=null;

function dragStartFieldType(e, tp) { dragFieldType=tp; dragFieldId=null; e.dataTransfer.effectAllowed='copy'; }
function dragStartField(e, fid, tid) { dragFieldId=fid; dragFieldTid=tid; dragFieldType=null; e.dataTransfer.effectAllowed='move'; }

function dragOverField(e, fid) {
  e.preventDefault();
  if(!dragFieldId) return;
  document.querySelectorAll('.field-card').forEach(c=>c.classList.remove('drag-over'));
  document.getElementById('fc_'+fid)?.classList.add('drag-over');
}

function dropFieldOnCanvas(e, tid) {
  e.preventDefault();
  document.querySelectorAll('.field-card').forEach(c=>c.classList.remove('drag-over'));
  if(dragFieldType) { addFieldByDrop(tid, dragFieldType, null); dragFieldType=null; }
}

function dropFieldReorder(e, targetFid, tid) {
  e.preventDefault();
  document.querySelectorAll('.field-card').forEach(c=>c.classList.remove('drag-over'));
  if(dragFieldId && dragFieldId!==targetFid) { reorderField(dragFieldId, targetFid, tid); dragFieldId=null; }
  else if(dragFieldType) { addFieldByDrop(tid, dragFieldType, targetFid); dragFieldType=null; }
}

async function addFieldByDrop(tid, type, beforeFid) {
  const t=state.templates.find(t=>t.id===tid); if(!t) return;
  const fields=[...t.fields].sort((a,b)=>a.order-b.order);
  const insertIdx = beforeFid ? fields.findIndex(f=>f.id===beforeFid) : fields.length;
  const newOrder = insertIdx===0 ? (fields[0]?.order||1)-1 : insertIdx>=fields.length ? (fields[fields.length-1]?.order||0)+1 : (fields[insertIdx-1].order+fields[insertIdx].order)/2;
  const newField = {id:'tmp_'+Date.now(), templateId:tid, name:typeLabel(type)+'字段', type, order:newOrder, required:false, options:'', hint:'', numberFormat:'raw', formula:''};
  const saved = await dbAddField(tid, newField);
  if(saved) {
    newField.id = saved.id;
    t.fields.push(newField);
    addLog(currentUserId,'添加字段',newField.name+'→'+t.name);
    renderTplEditor();
  }
}

async function reorderField(dragFid, targetFid, tid) {
  const t=state.templates.find(t=>t.id===tid); if(!t) return;
  const fields=[...t.fields].sort((a,b)=>a.order-b.order);
  const dragIdx=fields.findIndex(f=>f.id===dragFid);
  const targetIdx=fields.findIndex(f=>f.id===targetFid);
  if(dragIdx<0||targetIdx<0) return;
  const [moved]=fields.splice(dragIdx,1); fields.splice(targetIdx,0,moved);
  fields.forEach((f,i)=>{ f.order=i+1; });
  await dbUpdateFieldOrders(fields.map(f=>({id:f.id,order:f.order})));
  renderTplEditor();
}

async function moveField(fid, tid, dir) {
  const t=state.templates.find(t=>t.id===tid); if(!t) return;
  const fields=[...t.fields].sort((a,b)=>a.order-b.order);
  const idx=fields.findIndex(f=>f.id===fid);
  const swapIdx=idx+dir;
  if(idx<0||swapIdx<0||swapIdx>=fields.length) return;
  [fields[idx],fields[swapIdx]]=[fields[swapIdx],fields[idx]];
  fields.forEach((f,i)=>{ f.order=i+1; });
  await dbUpdateFieldOrders(fields.map(f=>({id:f.id,order:f.order})));
  renderTplEditor();
}

function handleLogoUpload(input) {
  if(!input.files.length) return;
  const file=input.files[0];
  if(file.size>5*1024*1024){toast('图片大小不能超过 5MB','error');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      canvas.width=128; canvas.height=128;
      const ctx=canvas.getContext('2d');
      const ratio=Math.min(128/img.width,128/img.height);
      const w=img.width*ratio, h=img.height*ratio;
      ctx.clearRect(0,0,128,128);
      ctx.drawImage(img,(128-w)/2,(128-h)/2,w,h);
      reportLogo=canvas.toDataURL('image/png');
      localStorage.setItem('hr_report_logo',reportLogo);
      toast('Logo 上传成功','success');
      updateLogoPreview(); // 只刷新 Logo 预览，不重渲染整页
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function formatFieldValue(val, format) {
  if (val===''||val===null||val===undefined) return '-';
  const n = parseFloat(val);
  if (isNaN(n)) return String(val)||'-';
  switch(format) {
    case 'percent':   return n.toFixed(1)+'%';
    case 'thousands': return n.toLocaleString('zh-CN');
    case 'currency':  return '¥'+n.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
    case 'decimal1':  return n.toFixed(1);
    case 'decimal2':  return n.toFixed(2);
    default: return String(val);
  }
}

function evalFormula(formulaStr, data) {
  if (!formulaStr) return '';
  try {
    const parts = JSON.parse(formulaStr);
    let expr = '';
    for (const p of parts) {
      if (p.t==='f') expr += parseFloat(data[p.id]||0);
      else if (p.t==='o') expr += ' '+p.v+' ';
    }
    if (!expr.trim()) return '';
    if (!/^[\d\s+\-*/.()]+$/.test(expr)) return 0;
    // eslint-disable-next-line no-eval
    const result = Function('"use strict"; return ('+expr+')')();
    return isFinite(result) ? result : 0;
  } catch(e) { return 0; }
}

function getFieldDisplay(f, data) {
  const raw = f.type==='calculated' ? evalFormula(f.formula, data||{}) : (data?.[f.id]??'');
  if ((f.type==='text'||f.type==='textarea') && raw) {
    return `<div class="rpt-rt">${raw}</div>`;
  }
  if (f.type==='table') {
    const cols=(f.options||'').split(',').map(c=>c.trim()).filter(Boolean);
    try {
      const rows=JSON.parse(raw||'[]');
      if(!rows.length||!cols.length) return '-';
      let t=`<table class="data-table" style="width:100%;border-collapse:collapse;font-size:12px;margin:4px 0"><thead><tr>${cols.map(c=>`<th style="padding:4px 8px;background:#f1f5f9;border:1px solid #e2e8f0;font-weight:600;white-space:nowrap">${c}</th>`).join('')}</tr></thead><tbody>`;
      rows.forEach(row=>{t+=`<tr>${cols.map((_,ci)=>`<td style="padding:4px 8px;border:1px solid #e2e8f0">${row[ci]||''}</td>`).join('')}</tr>`;});
      t+=`</tbody></table>`;
      return t;
    } catch(e){ return raw||'-'; }
  }
  return formatFieldValue(raw===''?'':raw, f.numberFormat||'raw');
}

function buildWeekTable(week, sections, fields, subs, direction) {
  const weekLabel = week ? `<div class="report-week-title">${week.label}</div>` : '';
  const sub1 = week ? subs.find(s=>s.weekNo===week.weekNo&&s.sectionId===sections[0].id) : null;
  let tbl = '';
  if (direction === 'vertical') {
    // Vertical: fields as rows, sections as columns
    tbl = `<table class="report-table"><thead><tr><th>内容</th>`;
    sections.forEach(sec=>{ tbl+=`<th>${sec.name}</th>`; });
    tbl+=`</tr></thead><tbody>`;
    fields.forEach(f=>{
      tbl+=`<tr><td style="font-weight:500">${f.name}</td>`;
      sections.forEach(sec=>{
        const sub = week ? subs.find(s=>s.weekNo===week.weekNo&&s.sectionId===sec.id) : null;
        tbl+=`<td>${getFieldDisplay(f, sub?.data)}</td>`;
      });
      tbl+=`</tr>`;
    });
    tbl+=`</tbody></table>`;
  } else {
    // Horizontal: fields as columns, sections as rows
    tbl = `<table class="report-table"><thead><tr><th>板块</th>`;
    fields.forEach(f=>{ tbl+=`<th>${f.name}</th>`; });
    tbl+=`</tr></thead><tbody>`;
    sections.forEach(sec=>{
      const sub = week ? subs.find(s=>s.weekNo===week.weekNo&&s.sectionId===sec.id) : null;
      tbl+=`<tr><td style="font-weight:500">${sec.name}</td>`;
      fields.forEach(f=>{ tbl+=`<td>${getFieldDisplay(f, sub?.data)}</td>`; });
      tbl+=`</tr>`;
    });
    tbl+=`</tbody></table>`;
  }
  return weekLabel + tbl;
}

function generateReport() {
  rptTitle=document.getElementById('rpt_title')?.value.trim()||rptTitle;
  rptWeekStart=document.getElementById('rpt_ws')?.value||rptWeekStart;
  rptWeekEnd=document.getElementById('rpt_we')?.value||rptWeekEnd;
  rptSections=[...document.querySelectorAll('input[name="rpt_sec"]:checked')].map(e=>e.value);
  const sortList=document.getElementById('tplSortList');
  if(sortList){
    rptTemplates=[...sortList.querySelectorAll('.tpl-sort-item')]
      .filter(el=>el.querySelector('input[type=checkbox]')?.checked)
      .map(el=>el.dataset.id);
  }
  if(!rptTitle){toast('请填写报告标题','error');return;}
  if(!rptSections.length){toast('请至少选择一个板块','error');return;}
  if(!rptTemplates.length){toast('请至少选择一个数据模板','error');return;}

  const allWeeks=getAvailableWeeks();
  const wsIdx=allWeeks.findIndex(w=>w.weekNo===rptWeekStart);
  const weIdx=allWeeks.findIndex(w=>w.weekNo===rptWeekEnd);
  const start=Math.min(wsIdx,weIdx); const end=Math.max(wsIdx,weIdx);
  const weeks=allWeeks.slice(start,end+1).reverse();
  const sections=rptSections.map(sid=>state.sections.find(s=>s.id===sid)).filter(Boolean);
  const today=new Date().toLocaleDateString('zh-CN');

async function addDocxPageNumbers(blob) {
  const zip = await JSZip.loadAsync(blob);
  const footerXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:ftr xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
       xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <w:p>
    <w:pPr><w:jc w:val="center"/><w:rPr><w:sz w:val="18"/><w:color w:val="888888"/></w:rPr></w:pPr>
    <w:r><w:rPr><w:sz w:val="18"/><w:color w:val="888888"/></w:rPr><w:t xml:space="preserve">第 </w:t></w:r>
    <w:fldSimple w:instr=" PAGE \* MERGEFORMAT "><w:r><w:rPr><w:sz w:val="18"/><w:color w:val="888888"/></w:rPr><w:t>1</w:t></w:r></w:fldSimple>
    <w:r><w:rPr><w:sz w:val="18"/><w:color w:val="888888"/></w:rPr><w:t xml:space="preserve"> / </w:t></w:r>
    <w:fldSimple w:instr=" NUMPAGES \* MERGEFORMAT "><w:r><w:rPr><w:sz w:val="18"/><w:color w:val="888888"/></w:rPr><w:t>1</w:t></w:r></w:fldSimple>
    <w:r><w:rPr><w:sz w:val="18"/><w:color w:val="888888"/></w:rPr><w:t xml:space="preserve"> 页</w:t></w:r>
  </w:p>
</w:ftr>`;
  zip.file('word/footer1.xml', footerXml);
  let ct = await zip.file('[Content_Types].xml').async('string');
  if (!ct.includes('footer1.xml')) {
    ct = ct.replace('</Types>', '<Override PartName="/word/footer1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.footer+xml"/></Types>');
    zip.file('[Content_Types].xml', ct);
  }
  let rels = await zip.file('word/_rels/document.xml.rels').async('string');
  if (!rels.includes('footer1.xml')) {
    rels = rels.replace('</Relationships>', '<Relationship Id="rId_footer1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/footer" Target="footer1.xml"/></Relationships>');
    zip.file('word/_rels/document.xml.rels', rels);
  }
  let docXml = await zip.file('word/document.xml').async('string');
  if (!docXml.includes('footerReference')) {
    docXml = docXml.replace('</w:sectPr>', '<w:footerReference w:type="default" r:id="rId_footer1"/></w:sectPr>');
    zip.file('word/document.xml', docXml);
  }
  return await zip.generateAsync({type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
}

function sxlAddRow(tbodyId, colCount) {
  const tbody=document.getElementById(tbodyId); if(!tbody)return;
  const cc=colCount||parseInt(tbody.dataset.cols)||0;
  const rowNum=tbody.rows.length+1;
  const cells=Array.from({length:cc},()=>`<td class="sxl-cell"><input type="text" onkeydown="sxlKeyNav(event)" onpaste="sxlHandlePaste(event)"></td>`).join('');
  const tr=document.createElement('tr');
  tr.innerHTML=`<td class="sxl-ridx">${rowNum}</td>${cells}`;
  tbody.appendChild(tr);
  const inp=tr.querySelector('input'); if(inp) inp.focus();
}
function sxlDelRow(tbodyId) {
  const tbody=document.getElementById(tbodyId);
  if(!tbody||tbody.rows.length<=1){toast('至少保留一行','error');return;}
  tbody.removeChild(tbody.lastElementChild);
}
function sxlKeyNav(e) {
  const inp=e.target; if(!inp||inp.tagName!=='INPUT')return;
  const td=inp.closest('td'); if(!td||!td.classList.contains('sxl-cell'))return;
  const tr=td.parentElement;
  const tbody=tr.parentElement;
  const colCount=parseInt(tbody.dataset.cols)||0; if(!colCount)return;
  const rowIdx=[...tbody.rows].indexOf(tr);
  const colIdx=[...tr.cells].indexOf(td)-1; // -1 for row-index cell
  const goTo=(r,c)=>{
    if(r<0||r>=tbody.rows.length||c<0||c>=colCount)return;
    const t=tbody.rows[r].cells[c+1]?.querySelector('input');
    if(t){t.focus();t.select();}
  };
  if(e.key==='Tab'){
    e.preventDefault();
    if(e.shiftKey){
      if(colIdx>0) goTo(rowIdx,colIdx-1); else goTo(rowIdx-1,colCount-1);
    } else {
      if(colIdx<colCount-1) goTo(rowIdx,colIdx+1);
      else if(rowIdx<tbody.rows.length-1) goTo(rowIdx+1,0);
      else { sxlAddRow(tbody.id,colCount); setTimeout(()=>goTo(rowIdx+1,0),0); }
    }
  } else if(e.key==='Enter'){
    e.preventDefault();
    if(rowIdx<tbody.rows.length-1) goTo(rowIdx+1,colIdx);
    else { sxlAddRow(tbody.id,colCount); setTimeout(()=>goTo(rowIdx+1,colIdx),0); }
  } else if(e.key==='ArrowUp'){ e.preventDefault(); goTo(rowIdx-1,colIdx); }
  else if(e.key==='ArrowDown'){ e.preventDefault(); goTo(rowIdx+1,colIdx); }
  else if(e.key==='ArrowLeft'&&inp.selectionStart===0&&inp.selectionEnd===0){ e.preventDefault(); goTo(rowIdx,colIdx-1); }
  else if(e.key==='ArrowRight'&&inp.selectionStart===inp.value.length&&inp.selectionEnd===inp.value.length){ e.preventDefault(); goTo(rowIdx,colIdx+1); }
}
function sxlHandlePaste(e) {
  const text=(e.clipboardData||window.clipboardData).getData('text/plain');
  if(!text||(!text.includes('\t')&&!text.includes('\n'))) return; // single value, let default handle
  e.preventDefault();
  const inp=e.target; if(!inp||inp.tagName!=='INPUT')return;
  const td=inp.closest('td'); if(!td||!td.classList.contains('sxl-cell'))return;
  const tr=td.parentElement;
  const tbody=tr.parentElement;
  const colCount=parseInt(tbody.dataset.cols)||0; if(!colCount)return;
  const startRow=[...tbody.rows].indexOf(tr);
  const startCol=[...tr.cells].indexOf(td)-1;
  const pasteRows=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  if(pasteRows.length>0&&pasteRows[pasteRows.length-1]==='') pasteRows.pop();
  pasteRows.forEach((rowStr,ri)=>{
    while(tbody.rows.length<=startRow+ri) sxlAddRow(tbody.id,colCount);
    const cells=rowStr.split('\t');
    const targetTr=tbody.rows[startRow+ri];
    cells.forEach((cellVal,ci)=>{
      const tc=startCol+ci;
      if(tc>=0&&tc<colCount){
        const ti=targetTr.cells[tc+1]?.querySelector('input');
        if(ti) ti.value=cellVal;
      }
    });
  });
  toast(`已粘贴 ${pasteRows.length} 行数据`,'success');
}

function ocMakePath(x1,y1,x2,y2,stroke,dasharray,marker){
  const my=(y1+y2)/2;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
  path.setAttribute('stroke',stroke);path.setAttribute('stroke-width','1.5');
  path.setAttribute('fill','none');path.setAttribute('marker-end',marker);
  if(dasharray)path.setAttribute('stroke-dasharray',dasharray);
  return path;
}

function ocUpTb(){

// --- Events ---
function ocInitEvents(){
  const wrap=document.getElementById('ocWrap'),svg=document.getElementById('ocSvg');if(!wrap||!svg)return;
  svg.addEventListener('mousedown',e=>{
    if(!e.target.closest('.oc-nd')){
      ocPanning=true;ocPanStart={x:e.clientX-ocViewTransform.x,y:e.clientY-ocViewTransform.y};
      wrap.style.cursor='grabbing';
      if(ocSelectedId){ocSelectedId=null;ocDrawN();ocUpTb();}
    }
  });
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const rect=wrap.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const z=e.deltaY<0?1.12:0.89;
    const ns=Math.min(3,Math.max(0.15,ocViewTransform.scale*z));
    ocViewTransform.x=mx-(mx-ocViewTransform.x)*(ns/ocViewTransform.scale);
    ocViewTransform.y=my-(my-ocViewTransform.y)*(ns/ocViewTransform.scale);
    ocViewTransform.scale=ns;ocApply();
  },{passive:false});
  if(!ocEventsInit){
    document.addEventListener('mousemove',ocGMM);
    document.addEventListener('mouseup',ocGMU);
    document.addEventListener('fullscreenchange',()=>{
      const btn=document.getElementById('ocFsBtn');
      if(btn)btn.textContent=document.fullscreenElement?'⊠ 退出全屏':'⛶ 全屏';
    });
    ocEventsInit=true;
  }
}

function ocNodeMD(e){
  e.stopPropagation();
  const id=e.currentTarget.dataset.id;
  // Update selection visuals directly — do NOT call ocDrawN() here or dblclick breaks
  // (recreating DOM between the two mousedowns prevents the browser from firing dblclick)
  if(ocSelectedId&&ocSelectedId!==id){
    const prev=document.querySelector(`.oc-nd[data-id="${ocSelectedId}"]`);
    if(prev){const rs=prev.querySelectorAll('rect');if(rs[1]){rs[1].setAttribute('fill','#2563eb');rs[1].setAttribute('stroke','#1d4ed8');rs[1].setAttribute('stroke-width','1');}}
  }
  const cur=e.currentTarget;const rs=cur.querySelectorAll('rect');
  if(rs[1]){rs[1].setAttribute('fill','#1e40af');rs[1].setAttribute('stroke','#fbbf24');rs[1].setAttribute('stroke-width','2.5');}
  ocSelectedId=id;ocUpTb();
  // Setup drag
  ocDragNodeId=id;ocDragStart={mx:e.clientX,my:e.clientY};ocDragOriginals={};
  function collect(nid){const n=ocChartData.nodes.find(x=>x.id===nid);if(!n)return;ocDragOriginals[nid]={x:n.x,y:n.y};ocChartData.nodes.filter(x=>x.parentId===nid).forEach(c=>collect(c.id));}
  collect(id);e.preventDefault();
}

function ocGMM(e){
  if(ocPanning){ocViewTransform.x=e.clientX-ocPanStart.x;ocViewTransform.y=e.clientY-ocPanStart.y;ocApply();return;}
  if(!ocDragNodeId)return;
  const dx=(e.clientX-ocDragStart.mx)/ocViewTransform.scale;
  const dy=(e.clientY-ocDragStart.my)/ocViewTransform.scale;
  Object.keys(ocDragOriginals).forEach(nid=>{
    const n=ocChartData.nodes.find(x=>x.id===nid);if(!n)return;
    n.x=ocDragOriginals[nid].x+dx;n.y=ocDragOriginals[nid].y+dy;
    const g=document.querySelector(`.oc-nd[data-id="${nid}"]`);
    if(g)g.setAttribute('transform',`translate(${n.x},${n.y})`);
  });
  ocDrawE();
}

function ocGMU(){ocDragNodeId=null;ocPanning=false;const w=document.getElementById('ocWrap');if(w)w.style.cursor='grab';}

// --- Auto Layout ---
function ocAutoLayout(){
  if(!ocChartData.nodes.length){toast('架构图为空','error');return;}
  function sw(id){const ch=ocChartData.nodes.filter(n=>n.parentId===id);if(!ch.length)return OC_W;return Math.max(OC_W,ch.reduce((s,c)=>s+sw(c.id),0)+OC_HG*(ch.length-1));}
  function place(id,lx,y){const n=ocChartData.nodes.find(x=>x.id===id);if(!n)return;const w=sw(id);n.x=lx+(w-OC_W)/2;n.y=y;const ch=ocChartData.nodes.filter(x=>x.parentId===id);let cx=lx;ch.forEach(c=>{const csw=sw(c.id);place(c.id,cx,y+OC_H+OC_VG);cx+=csw+OC_HG;});}
  const roots=ocChartData.nodes.filter(n=>!n.parentId);let rx=0;
  roots.forEach(r=>{const w=sw(r.id);place(r.id,rx,0);rx+=w+OC_HG*2;});
  ocViewTransform={x:60,y:60,scale:1};ocRender();toast('已自动排版','success');
}

// --- Export PNG ---
async function ocExportPng(){
  const nodes=ocChartData.nodes;
  if(!nodes.length){toast('架构图为空，无法导出','error');return;}
  const pad=40;
  const minX=Math.min(...nodes.map(n=>n.x))-pad,minY=Math.min(...nodes.map(n=>n.y))-pad;
  const maxX=Math.max(...nodes.map(n=>n.x+OC_W))+pad,maxY=Math.max(...nodes.map(n=>n.y+OC_H))+pad;
  const vw=maxX-minX,vh=maxY-minY;
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  let es='',ns='';
  nodes.forEach(n=>{
    if(n.parentId){const p=nodes.find(x=>x.id===n.parentId);if(p){const x1=p.x+OC_W/2,y1=p.y+OC_H,x2=n.x+OC_W/2,y2=n.y,my=(y1+y2)/2;es+=`<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>`;}}
    if(n.dottedParentIds&&n.dottedParentIds.length){n.dottedParentIds.forEach(pid=>{const p=nodes.find(x=>x.id===pid);if(!p)return;const x1=p.x+OC_W/2,y1=p.y+OC_H,x2=n.x+OC_W/2,y2=n.y,my=(y1+y2)/2;es+=`<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#a2d)"/>`;});}
    ns+=`<g transform="translate(${n.x},${n.y})"><rect x="2" y="3" width="${OC_W}" height="${OC_H}" rx="8" fill="rgba(0,0,0,0.07)"/><rect width="${OC_W}" height="${OC_H}" rx="8" fill="#2563eb" stroke="#1d4ed8"/><text x="${OC_W/2}" y="26" text-anchor="middle" fill="white" font-size="13" font-weight="600" font-family="Arial,sans-serif">${esc(ocTr(n.name||'',10))}</text><line x1="10" y1="35" x2="${OC_W-10}" y2="35" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>${n.title?`<text x="${OC_W/2}" y="52" text-anchor="middle" fill="#bfdbfe" font-size="11" font-family="Arial,sans-serif">${esc(ocTr(n.title,14))}</text>`:''}</g>`;
  });
  const secName=state.sections.find(s=>s.id===ocSectionId)?.name||'';
  const svgStr=`<?xml version="1.0" encoding="UTF-8"?><svg width="${vw}" height="${vh}" viewBox="${minX} ${minY} ${vw} ${vh}" xmlns="http://www.w3.org/2000/svg"><defs><marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker><marker id="a2d" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f59e0b"/></marker></defs><rect x="${minX}" y="${minY}" width="${vw}" height="${vh}" fill="white"/>${es}${ns}</svg>`;
  const scale=2,canvas=document.createElement('canvas');canvas.width=vw*scale;canvas.height=vh*scale;
  const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
  const img=new Image();
  img.onload=()=>{ctx.drawImage(img,0,0,canvas.width,canvas.height);const a=document.createElement('a');a.download=(secName||'组织架构图')+'_架构图.png';a.href=canvas.toDataURL('image/png');a.click();toast('图片已导出','success');};
  img.onerror=()=>toast('图片导出失败，请重试','error');
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
}

// --- PDF Import ---
async function ocImportPdf(inp){
  if(!inp.files.length)return;
  const file=inp.files[0];inp.value='';
  if(typeof pdfjsLib==='undefined'){toast('PDF解析库加载中，请稍后重试','error');return;}
  if(!pdfjsLib.GlobalWorkerOptions.workerSrc){
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  toast('正在解析 PDF，请稍候…','info');
  try{
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let items=[];
    for(let p=1;p<=pdf.numPages;p++){
      const pg=await pdf.getPage(p);const vp=pg.getViewport({scale:1});
      const tc=await pg.getTextContent();
      tc.items.forEach(it=>{
        const s=(it.str||'').trim();if(!s)return;
        const tx=pdfjsLib.Util.transform(vp.transform,it.transform);
        items.push({text:s,x:Math.round(tx[4]),y:Math.round(vp.height-tx[5]),w:Math.round(Math.abs(it.width||40))});
      });
    }
    if(!items.length){toast('PDF中未发现文字内容','error');return;}
    const nodes=ocParsePdf(items);
    if(!nodes.length){toast('未能自动识别组织架构，请手动创建节点','error');return;}
    if(ocChartData.nodes.length>0&&!confirm(`已有${ocChartData.nodes.length}个节点，导入将覆盖现有内容，是否继续？`))return;
    ocChartData.nodes=nodes;ocAutoLayout();
    toast(`已从 PDF 识别 ${nodes.length} 个人员节点，请确认后保存`,'success');
  }catch(e){console.error('PDF:',e);toast('PDF解析失败：'+e.message,'error');}
}

    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const max=400,ratio=Math.min(1,max/img.width,max/img.height);
        const canvas=document.createElement('canvas');
        canvas.width=Math.round(img.width*ratio);canvas.height=Math.round(img.height*ratio);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        canvas.toBlob(blob=>resolve(blob||file),'image/jpeg',0.82);
      };
      img.onerror=()=>resolve(file);
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function blFmtSize(bytes){
  if(!bytes)return'';
  if(bytes<1024)return bytes+'B';
  if(bytes<1048576)return(bytes/1024).toFixed(0)+'KB';
  return(bytes/1048576).toFixed(1)+'MB';
}

function blPreviewPhoto(inp){
  if(!inp.files[0])return;
  const file=inp.files[0];
  if(!file.type.startsWith('image/')){toast('请选择图片文件','error');return;}
  blFormPhotoFile=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const pc=document.getElementById('blPC');
    if(pc)pc.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  };
  reader.readAsDataURL(file);
}

function blRenderAllAtts(){
  const el=document.getElementById('blAL');if(!el)return;
  let html='';
  blExistingAtts.forEach(a=>{
    const fn=(a.file_name||'').replace(/"/g,'');
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;border:1px solid #e2e8f0;border-radius:6px;margin-bottom:5px">
      <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${fn}">${fn}</span>
      <span style="font-size:11px;color:#94a3b8">${blFmtSize(a.file_size)}</span>
      <a href="${a.file_url}" target="_blank" rel="noopener" class="btn btn-secondary btn-sm" style="font-size:11px;padding:2px 8px">查看</a>
      <button class="btn btn-secondary btn-sm" style="font-size:11px;padding:2px 8px;color:#dc2626" onclick="blDelExistAtt('${a.id}')">删除</button>
    </div>`;
  });
  blFormAttFiles.forEach((f,i)=>{
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;border:1px dashed #cbd5e1;border-radius:6px;margin-bottom:5px;background:#f8fafc">
      <span class="badge badge-blue" style="font-size:10px;flex-shrink:0">待上传</span>
      <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span>
      <span style="font-size:11px;color:#94a3b8">${blFmtSize(f.size)}</span>
      <button class="btn btn-secondary btn-sm" style="font-size:11px;padding:2px 8px;color:#dc2626" onclick="blRmPending(${i})">移除</button>
    </div>`;
  });
  el.innerHTML=html||'<div style="color:#94a3b8;font-size:13px">暂无附件</div>';
}

function blAddAttFiles(inp){
  [...inp.files].forEach(f=>{
    if(f.size>10*1024*1024){toast(`「${f.name}」超过 10MB 限制，已跳过`,'error');return;}
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    if(!['pdf','doc','docx','jpg','jpeg','png','gif','webp','bmp'].includes(ext)){toast(`「${f.name}」格式不支持`,'error');return;}
    blFormAttFiles.push(f);
  });
  inp.value='';blRenderAllAtts();
}

function blRmPending(i){
  blFormAttFiles.splice(i,1);blRenderAllAtts();
}

async function blDelExistAtt(attId){
  if(!confirm('确定删除此附件？'))return;
  const att=blExistingAtts.find(a=>a.id===attId);
  const {error}=await sb.from('blacklist_attachments').delete().eq('id',attId);
  if(error){toast('删除失败：'+error.message,'error');return;}
  if(att?.file_url){
    try{
      const u=new URL(att.file_url);
      const prefix=`/storage/v1/object/public/${BL_BUCKET}/`;
      const p=u.pathname.startsWith(prefix)?u.pathname.slice(prefix.length):null;
      if(p) sb.storage.from(BL_BUCKET).remove([p]);
    }catch(e){}
  }
  blExistingAtts=blExistingAtts.filter(a=>a.id!==attId);
  blRenderAllAtts();
  toast('附件已删除','success');
}

  if(!dob){toast('出生日期为必填项','error');return;}

  // Uniqueness checks (blocking)

  }
  const mid2=(document.getElementById('bl_mid')?.value||'').trim();
  const full=[last,mid2,first].filter(Boolean).join(' ');
  // Full name uniqueness — warn only
  if(full){
    const dupName=blItems.find(i=>i.full_name===full&&i.id!==editId);
    if(dupName){
      const proceed=confirm(`提示：已存在同名记录「${dupName.full_name}」，请确认是否为不同人员。\n\n点「确定」继续添加，点「取消」返回检查。`);
      if(!proceed)return;
    }
  }
  // Collect Quill reason HTML
  const qHtml=window._blQuill?window._blQuill.root.innerHTML:'';
  const reason=(qHtml==='<p><br></p>'||!qHtml.trim()||qHtml==='<p></p>')?'':qHtml;
  const payload={
    last_name:last,middle_name:mid2,first_name:first,full_name:full,
    id_number:idno,passport_no:pptno,gender,birth_date:dob,section_id:secId||null,
    employee_no:(document.getElementById('bl_empno')?.value||'').trim(),
    nationality:(document.getElementById('bl_nat')?.value||'').trim(),
    ethnicity:(document.getElementById('bl_eth')?.value||'').trim(),
    religion:(document.getElementById('bl_rel')?.value||'').trim(),
    home_address:(document.getElementById('bl_addr')?.value||'').trim(),
    reason,
    photo_url:editId?(blItems.find(i=>i.id===editId)?.photo_url||''):'',
    updated_at:new Date().toISOString(),updated_by:currentUserId
  };
  let savedId=editId;
  if(editId){
    const ok=await dbBlUpdate(editId,payload);if(!ok)return;
    const idx=blItems.findIndex(i=>i.id===editId);
    if(idx>=0) blItems[idx]={...blItems[idx],...payload};
  }else{
    payload.created_by=currentUserId;
    const rec=await dbBlAdd(payload);if(!rec)return;
    savedId=rec.id;
    blItems.push({...payload,id:savedId});
    blItems.sort((a,b)=>(a.last_name||'').localeCompare(b.last_name||''));
  }
  // Upload photo
  if(blFormPhotoFile){
    const blob=await blCompressImg(blFormPhotoFile);
    const ext=(blFormPhotoFile.name.split('.').pop()||'jpg').toLowerCase();
    const url=await blUploadFile(blob,`photos/${savedId}.${ext}`);
    if(url){
      await sb.from('blacklist').update({photo_url:url}).eq('id',savedId);
      const idx=blItems.findIndex(i=>i.id===savedId);
      if(idx>=0) blItems[idx].photo_url=url;
    }
  }
  // Upload pending attachments
  for(const f of blFormAttFiles){
    const safe=f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const url=await blUploadFile(f,`attachments/${savedId}/${Date.now()}_${safe}`);
    if(url) await sb.from('blacklist_attachments').insert({blacklist_id:savedId,file_name:f.name,file_url:url,file_size:f.size,created_by:currentUserId});
  }
  closeModal(mid);
  toast(editId?'记录已更新':'记录已添加','success');
  blRenderGrid();
}

function ocParsePdf(items){
  items.sort((a,b)=>a.y-b.y||a.x-b.x);
  // group into rows by Y proximity
  const rows=[];
  items.forEach(it=>{const last=rows[rows.length-1];if(last&&Math.abs(it.y-last.y)<=15){last.items.push(it);}else{rows.push({y:it.y,items:[it]});}});
  // group row items into horizontal cells
  const cells=[];
  rows.forEach(row=>{
    row.items.sort((a,b)=>a.x-b.x);let cur=null;
    row.items.forEach(it=>{
      if(cur&&it.x-(cur.x+cur.w)<25){cur.text+=' '+it.text;cur.w=it.x+it.w-cur.x;}
      else{cur={x:it.x,y:row.y,w:it.w||60,text:it.text};cells.push(cur);}
    });
  });
  // merge vertically adjacent cells with similar X center (name+title in same box)
  cells.sort((a,b)=>a.y-b.y||a.x-b.x);
  const merged=[],used=new Set();
  cells.forEach((c,i)=>{
    if(used.has(i))return;
    const grp=[c];used.add(i);const cx=c.x+c.w/2;
    for(let j=i+1;j<cells.length;j++){
      if(used.has(j))continue;const c2=cells[j];
      if(c2.y-(c.y+14)>30)break;
      if(Math.abs((c2.x+c2.w/2)-cx)<50){grp.push(c2);used.add(j);}
    }
    merged.push({cx,y:Math.min(...grp.map(x=>x.y)),lines:grp.map(x=>x.text.trim()).filter(Boolean)});
  });
  // parse name/title from lines
  const TKW=/总|监|经理|主任|专员|助理|部长|组长|主管|总裁|总监|CEO|COO|CFO|HRD|VP|Director|Manager|Head|Lead/i;
  const nodes=merged.map(m=>{
    if(!m.lines.length)return null;
    let name='',title='';
    const ni=m.lines.findIndex(l=>/^[一-龥·]{2,5}$/.test(l));
    if(ni>=0){name=m.lines[ni];title=m.lines.filter((_,k)=>k!==ni).join(' ');}
    else{const ti=m.lines.findIndex(l=>TKW.test(l));if(ti>=0){title=m.lines[ti];name=m.lines.filter((_,k)=>k!==ti).join(' ');}else{name=m.lines[0];title=m.lines.slice(1).join(' ');}}
    if(!name&&!title)return null;if(!name){name=title;title='';}
    return{id:ocGenId(),name:name.trim(),title:title.trim(),parentId:null,x:m.cx,y:m.y,_cx:m.cx,_y:m.y};
  }).filter(Boolean);
  if(!nodes.length)return[];
  // detect hierarchy by Y and X position
  nodes.sort((a,b)=>a._y-b._y||a._cx-b._cx);
  const Y_GAP=40;
  nodes.forEach((nd,i)=>{
    if(!i)return;
    const cands=nodes.slice(0,i).filter(p=>nd._y-p._y>=Y_GAP);if(!cands.length)return;
    const topY=Math.max(...cands.map(c=>c._y));
    const level=cands.filter(c=>topY-c._y<Y_GAP);
    let best=null,bestD=Infinity;
    level.forEach(c=>{const d=Math.abs(c._cx-nd._cx);if(d<bestD){bestD=d;best=c;}});
    if(best)nd.parentId=best.id;
  });
  nodes.forEach(n=>{delete n._cx;delete n._y;});
  return nodes;
}
