<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR 周报数据提报与报告生成平台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1e293b;color:#94a3b8;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid #334155}
.sidebar-logo .logo-title{font-size:15px;font-weight:700;color:#fff;line-height:1.3}
.sidebar-logo .logo-sub{font-size:11px;color:#64748b;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 20px 4px;font-size:11px;font-weight:600;color:#475569;letter-spacing:.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:#94a3b8;font-size:13px;transition:.15s;border-left:3px solid transparent}
.nav-item:hover{color:#e2e8f0;background:rgba(255,255,255,.05)}
.nav-item.active{color:#fff;background:rgba(37,99,235,.2);border-left-color:#2563eb}
.nav-icon{width:18px;text-align:center;font-size:15px}
.sidebar-footer{padding:12px 20px;border-top:1px solid #334155}
.main{margin-left:220px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:600;color:#1e293b}
.topbar-right{display:flex;align-items:center;gap:14px}
.week-badge{background:#eff6ff;color:#2563eb;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.user-switcher{display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;border-radius:8px;background:#f8fafc;border:1px solid #e2e8f0;font-size:13px}
.user-switcher:hover{background:#f1f5f9}
.user-dot{width:8px;height:8px;border-radius:50%}
.dot-admin{background:#2563eb}
.dot-user{background:#16a34a}
.content{padding:24px 28px;flex:1}
/* Cards */
.page-header{margin-bottom:20px}
.page-header h2{font-size:20px;font-weight:700;color:#0f172a}
.page-header p{color:#64748b;font-size:13px;margin-top:3px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid #f1f5f9}
.card-header{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600;color:#0f172a}
.card-body{padding:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
/* Stats */
.stat-card{background:#fff;border-radius:10px;padding:18px 20px;border:1px solid #f1f5f9;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;align-items:flex-start;gap:14px}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-icon.blue{background:#eff6ff}
.stat-icon.green{background:#f0fdf4}
.stat-icon.orange{background:#fff7ed}
.stat-icon.purple{background:#faf5ff}
.stat-value{font-size:24px;font-weight:700;color:#0f172a;line-height:1}
.stat-label{font-size:12px;color:#64748b;margin-top:4px}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:500}
.badge-blue{background:#eff6ff;color:#2563eb}
.badge-green{background:#f0fdf4;color:#16a34a}
.badge-orange{background:#fff7ed;color:#ea580c}
.badge-red{background:#fef2f2;color:#dc2626}
.badge-gray{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0}
/* Table */
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px;background:#f8fafc;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid #f1f5f9}
tr:hover td{background:#fafcff}
tr:last-child td{border-bottom:none}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;text-decoration:none}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#f8fafc;color:#374151;border:1px solid #e2e8f0}
.btn-secondary:hover{background:#f1f5f9}
.btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.btn-success:hover{background:#dcfce7}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Form */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px}
.form-label .req{color:#dc2626;margin-left:2px}
.form-control{width:100%;border:1px solid #d1d5db;border-radius:7px;padding:8px 12px;font-size:13px;outline:none;background:#fff;transition:.15s;color:#1e293b}
.form-control:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select.form-control{cursor:pointer}
textarea.form-control{resize:vertical;min-height:80px;font-family:inherit}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-hint{font-size:11px;color:#94a3b8;margin-top:3px}
/* Tabs */
.tabs{display:flex;border-bottom:2px solid #f1f5f9;margin-bottom:20px;gap:0}
.tab{padding:9px 18px;cursor:pointer;font-size:13px;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:500}
.tab:hover{color:#2563eb}
.tab.active{color:#2563eb;border-bottom-color:#2563eb}
/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-lg{max-width:700px}
.modal-xl{max-width:900px}
.modal-header{padding:18px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-size:15px;font-weight:600}
.modal-close{border:none;background:none;cursor:pointer;font-size:20px;color:#94a3b8;line-height:1;padding:4px}
.modal-body{padding:20px 24px}
.modal-footer{padding:14px 24px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 12px 12px}
/* Progress */
.progress-bar{background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden}
.progress-fill{background:#2563eb;height:100%;border-radius:99px;transition:.3s}
/* Toast */
.toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e293b;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;min-width:220px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:toastIn .2s ease}
.toast.success{background:#15803d}
.toast.error{background:#b91c1c}
.toast.warning{background:#c2410c}
@keyframes toastIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
/* Fields drag */
.field-list{display:flex;flex-direction:column;gap:8px}
.field-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:grab;user-select:none}
.field-item.dragging{opacity:.5;border-style:dashed}
.field-item.drag-over{border-color:#2563eb;background:#eff6ff}
.field-drag-handle{color:#94a3b8;font-size:16px;cursor:grab}
.field-name{flex:1;font-weight:500;font-size:13px}
.field-type-badge{font-size:11px;color:#64748b;background:#e2e8f0;padding:2px 7px;border-radius:4px}
/* Submission form */
.submit-form{display:flex;flex-direction:column;gap:12px}
.submit-field{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px 16px}
.submit-field-label{font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.required-dot{color:#dc2626;font-size:16px;line-height:1}
/* Report preview */
.report-preview{background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.report-a4{width:100%;padding:40px;min-height:400px;font-size:13px;line-height:1.7}
.report-a4 h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;color:#0f172a}
.report-a4 .report-meta{text-align:center;color:#64748b;font-size:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0f172a}
.report-a4 h2{font-size:15px;font-weight:700;margin:20px 0 10px;color:#0f172a;padding-bottom:6px;border-bottom:1px solid #e2e8f0}
.report-a4 h3{font-size:13px;font-weight:600;margin:12px 0 6px;color:#374151}
.report-a4 .data-table{width:100%;border-collapse:collapse;margin:8px 0 16px;font-size:12px}
.report-a4 .data-table th{background:#f8fafc;padding:7px 10px;text-align:left;font-weight:600;border:1px solid #e2e8f0;white-space:nowrap}
.report-a4 .data-table td{padding:7px 10px;border:1px solid #e2e8f0}
.report-a4 .report-footer{margin-top:32px;padding-top:12px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8;text-align:center}
.progress-section{background:#f8fafc;border-radius:8px;padding:14px;margin-bottom:10px;border-left:3px solid #e2e8f0}
.progress-section.submitted{border-left-color:#16a34a}
.progress-section.draft{border-left-color:#f59e0b}
.progress-section.pending{border-left-color:#e2e8f0}
/* Checklist */
.section-select-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.section-check{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent}
.section-check:hover{background:#f8fafc;border-color:#e2e8f0}
.section-check input{cursor:pointer;width:15px;height:15px;accent-color:#2563eb}
/* Field builder palette & canvas */
.palette-chip{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:grab;margin-bottom:7px;font-size:13px;font-weight:500;user-select:none;transition:.15s;border:1.5px solid transparent}
.palette-chip:hover{filter:brightness(.96);border-color:rgba(0,0,0,.1)}
.palette-chip:active{cursor:grabbing}
.palette-chip-icon{font-size:12px;font-weight:800;min-width:24px;text-align:center;background:rgba(255,255,255,.65);border-radius:4px;padding:1px 4px;letter-spacing:-.5px}
.field-canvas{min-height:120px;border-radius:8px;transition:.2s;padding:2px 0}
.field-canvas.drag-active{background:#eff6ff;border:2px dashed #2563eb;padding:8px}
.canvas-empty{text-align:center;padding:36px 16px;color:#94a3b8;font-size:13px;border:2px dashed #e2e8f0;border-radius:8px}
.field-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;margin-bottom:8px;transition:.15s;cursor:default}
.field-row:hover{border-color:#cbd5e1;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.field-row.dragging{opacity:.35;border-style:dashed}
.field-row.drag-over{border-color:#2563eb;background:#eff6ff;border-top:2px solid #2563eb}
.field-drag-handle{color:#cbd5e1;cursor:grab;font-size:16px;flex-shrink:0;line-height:1;padding:2px 0}
.field-drag-handle:hover{color:#64748b}
.field-row-type{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;border:1px solid;white-space:nowrap;flex-shrink:0}
.field-name-input{flex:1;border:1px solid transparent;border-radius:6px;padding:5px 8px;font-size:13px;font-weight:500;color:#1e293b;background:transparent;outline:none;min-width:0;cursor:text;transition:.15s}
.field-name-input:hover{border-color:#d1d5db;background:#f8fafc}
.field-name-input:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1);cursor:text}
.req-toggle{border:1px solid #e2e8f0;background:#f8fafc;color:#94a3b8;border-radius:5px;padding:3px 9px;font-size:12px;cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0;font-family:inherit}
.req-toggle:hover{border-color:#94a3b8;color:#374151}
.req-toggle.req-on{background:#fef2f2;border-color:#fca5a5;color:#dc2626;font-weight:600}
/* Empty */
.empty-state{text-align:center;padding:48px 20px;color:#94a3b8}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:14px}
/* Log items */
.log-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.log-item:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;background:#2563eb;margin-top:5px;flex-shrink:0}
.log-content{flex:1}
.log-action{font-size:13px;color:#374151}
.log-time{font-size:11px;color:#94a3b8;margin-top:2px}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.toolbar-left{flex:1;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
/* Week selector */
.week-selector{display:flex;align-items:center;gap:8px}
.week-selector .week-nav{border:1px solid #e2e8f0;background:#fff;border-radius:6px;padding:5px 10px;cursor:pointer;color:#374151;font-size:13px}
.week-selector .week-nav:hover{background:#f8fafc}
.week-label{font-weight:600;color:#0f172a;font-size:14px;min-width:120px;text-align:center}
/* Print styles */
@media print{
  .sidebar,.topbar,.toolbar,.btn,.tab,.modal-backdrop,.toast-container{display:none!important}
  .main{margin:0}
  .content{padding:0}
  .report-a4{padding:20px;font-size:12px}
  body{background:#fff}
}
</style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title">HR 报告平台</div>
      <div class="logo-sub">数据提报与报告生成</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="nav-section">工作台</div>
      <div class="nav-item active" data-view="overview"><span class="nav-icon">📊</span>总览</div>
      <div class="nav-item" data-view="submission"><span class="nav-icon">📝</span>数据填报</div>
      <div class="nav-item" data-view="history"><span class="nav-icon">🗂️</span>历史数据</div>
      <div class="nav-section">管理</div>
      <div class="nav-item" data-view="admin"><span class="nav-icon">⚙️</span>管理后台</div>
      <div class="nav-item" data-view="templates"><span class="nav-icon">📋</span>模板配置</div>
      <div class="nav-item" data-view="reports"><span class="nav-icon">📄</span>报告生成</div>
    </nav>
    <div class="sidebar-footer" style="font-size:11px;color:#475569">MVP v1.0 · 演示版本</div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">总览</div>
      <div class="topbar-right">
        <span class="week-badge" id="currentWeekBadge"></span>
        <div class="user-switcher" onclick="switchUser()" title="点击切换角色">
          <div class="user-dot" id="userDot"></div>
          <span id="currentUserLabel"></span>
          <span style="color:#94a3b8">▾</span>
        </div>
      </div>
    </div>
    <div class="content" id="appContent"></div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// STATE & STORAGE
// ============================================================
const STORE_KEY = 'hr_platform_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

// Get or init state
let state = loadState();

// ============================================================
// SEED DATA
// ============================================================
function initSeedData() {
  if (state._seeded) return;

  state.users = [
    {id:'u1',name:'李管理员',account:'admin',role:'admin',sections:['s1','s2','s3','s4','s5'],status:'active'},
    {id:'u2',name:'王招聘',account:'zhaopin',role:'member',sections:['s1'],status:'active'},
    {id:'u3',name:'张薪酬',account:'xinchou',role:'member',sections:['s2'],status:'active'},
    {id:'u4',name:'陈培训',account:'peixun',role:'member',sections:['s3'],status:'active'},
    {id:'u5',name:'刘员关',account:'yuanguan',role:'member',sections:['s4'],status:'active'},
    {id:'u6',name:'赵HRBP',account:'hrbp',role:'member',sections:['s5'],status:'active'},
    {id:'u7',name:'钱只读',account:'readonly',role:'viewer',sections:['s1','s2','s3'],status:'active'},
  ];

  state.sections = [
    {id:'s1',name:'招聘组',head:'王招聘',order:1,status:'active'},
    {id:'s2',name:'薪酬组',head:'张薪酬',order:2,status:'active'},
    {id:'s3',name:'培训组',head:'陈培训',order:3,status:'active'},
    {id:'s4',name:'员工关系组',head:'刘员关',order:4,status:'active'},
    {id:'s5',name:'HRBP',head:'赵HRBP',order:5,status:'active'},
  ];

  state.templates = [
    {
      id:'t1',name:'通用招聘周报模板',category:'招聘',sections:['s1'],version:'v1.2',status:'active',
      fields:[
        {id:'f1',name:'本周新增需求职位数',type:'number',required:true,order:1,hint:''},
        {id:'f2',name:'简历收集数',type:'number',required:true,order:2,hint:''},
        {id:'f3',name:'面试安排人数',type:'number',required:true,order:3,hint:''},
        {id:'f4',name:'录用人数',type:'number',required:true,order:4,hint:''},
        {id:'f5',name:'到岗人数',type:'number',required:false,order:5,hint:''},
        {id:'f6',name:'招聘渠道',type:'select',required:false,order:6,hint:'',options:'BOSS直聘,猎头,内推,校招'},
        {id:'f7',name:'重点进展与问题',type:'textarea',required:false,order:7,hint:'记录本周招聘重点事项'},
      ]
    },
    {
      id:'t2',name:'薪酬福利周报模板',category:'薪酬',sections:['s2'],version:'v1.0',status:'active',
      fields:[
        {id:'f8',name:'本月应发薪资总额（万元）',type:'number',required:true,order:1,hint:''},
        {id:'f9',name:'本周处理薪酬变动人数',type:'number',required:true,order:2,hint:''},
        {id:'f10',name:'社保公积金办理人数',type:'number',required:false,order:3,hint:''},
        {id:'f11',name:'福利费用支出（万元）',type:'number',required:false,order:4,hint:''},
        {id:'f12',name:'本周工作摘要',type:'textarea',required:false,order:5,hint:''},
      ]
    },
    {
      id:'t3',name:'培训发展周报模板',category:'培训',sections:['s3'],version:'v1.1',status:'active',
      fields:[
        {id:'f13',name:'本周培训场次',type:'number',required:true,order:1,hint:''},
        {id:'f14',name:'培训参与人次',type:'number',required:true,order:2,hint:''},
        {id:'f15',name:'培训满意度（%）',type:'number',required:false,order:3,hint:''},
        {id:'f16',name:'培训类型',type:'select',required:false,order:4,hint:'',options:'线上,线下,混合'},
        {id:'f17',name:'本周培训内容摘要',type:'textarea',required:false,order:5,hint:''},
      ]
    },
    {
      id:'t4',name:'综合HR周报模板',category:'综合',sections:['s4','s5'],version:'v1.0',status:'active',
      fields:[
        {id:'f18',name:'在职员工总数',type:'number',required:true,order:1,hint:''},

// WEEK UTILITIES
// ============================================================
function getWeekInfo(weeksAgo = 0) {
  const now = new Date();
  now.setDate(now.getDate() - weeksAgo * 7);
  const d = new Date(now);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - (d.getDay() + 6) % 7); // Monday
  const year = d.getFullYear();
  const startOfYear = new Date(year, 0, 1);
  const weekNo = Math.ceil(((d - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
  const end = new Date(d); end.setDate(d.getDate() + 6);
  return {
    weekNo: `${year}-W${String(weekNo).padStart(2,'0')}`,
    label: `${year}年第${weekNo}周`,
    start: d.toISOString().split('T')[0],
    end: end.toISOString().split('T')[0],
    year, weekNo: `${year}-W${String(weekNo).padStart(2,'0')}`
  };
}

function getWeekInfoFromNo(weekNo) {
  const [year, week] = weekNo.split('-W').map(Number);
  const jan1 = new Date(year, 0, 1);
  const daysToMonday = (8 - jan1.getDay()) % 7;
  const firstMonday = new Date(jan1); firstMonday.setDate(jan1.getDate() + daysToMonday);
  const start = new Date(firstMonday); start.setDate(firstMonday.getDate() + (week-1)*7);
  const end = new Date(start); end.setDate(start.getDate() + 6);
  return {
    label: `${year}年第${week}周`,
    start: start.toISOString().split('T')[0],
    end: end.toISOString().split('T')[0]
  };
}

function getAllWeeks() {
  const weeks = [];
  for (let i = 12; i >= 0; i--) weeks.push(getWeekInfo(i));
  return weeks;
}

  div.innerHTML = `<div class="modal ${size}">

function renderSubForm(wi) {
  const area = document.getElementById('subFormArea');
  if (!area) return;

  if (!subSectionId) { area.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>您暂无可填报的板块</p></div>'; return; }

  const section = state.sections.find(s=>s.id===subSectionId);
  const template = state.templates.find(t=>t.status==='active' && t.sections.includes(subSectionId));
  if (!template) { area.innerHTML = '<div class="card"><div class="card-body"><div class="empty-state"><p>该板块暂无绑定模板</p></div></div></div>'; return; }

  const existing = state.submissions.find(s=>s.weekNo===wi.weekNo&&s.sectionId===subSectionId);
  const lastWeek = state.submissions.find(s=>s.sectionId===subSectionId && s.status==='submitted' && s.weekNo!==wi.weekNo);
  const isViewer = u.role==='viewer';
  const data = existing ? {...existing.data} : {};

  const fields = template.fields.sort((a,b)=>a.order-b.order);
  let fieldsHtml = fields.map(f => {
    const val = data[f.id] || '';
    const disabled = isViewer ? 'disabled' : '';
    let input = '';
    if (f.type==='number') input = `<input type="number" class="form-control" id="sf_${f.id}" value="${val}" min="0" ${disabled}>`;
    else if (f.type==='textarea') input = `<textarea class="form-control" id="sf_${f.id}" ${disabled}>${val}</textarea>`;
    else if (f.type==='select') {
      const opts = (f.options||'').split(',').map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('');
      input = `<select class="form-control" id="sf_${f.id}" ${disabled}><option value="">请选择</option>${opts}</select>`;
    } else input = `<input type="text" class="form-control" id="sf_${f.id}" value="${val}" ${disabled}>`;
    return `<div class="submit-field">
      <div class="submit-field-label">${f.name}${f.required?'<span class="required-dot">*</span>':''}
        ${f.hint?`<span style="font-size:11px;color:#94a3b8;font-weight:400">&nbsp;·&nbsp;${f.hint}</span>`:''}
      </div>
      ${input}
    </div>`;
  }).join('');

  const statusBadge = existing
    ? `<span class="badge ${existing.status==='submitted'?'badge-green':'badge-orange'}">${existing.status==='submitted'?'已提交':'草稿'}</span>`

      <div><span class="card-title">${section.name} · ${wi.label}</span>&nbsp;${statusBadge}</div>
      <div style="font-size:12px;color:#64748b">模板：${template.name} ${template.version}</div>

    <div class="card-body">
      ${!isViewer&&lastWeek?`<div style="margin-bottom:16px"><button class="btn btn-secondary btn-sm" onclick="copyLastWeek('${lastWeek.id}')">📋 复制上周数据（${lastWeek.weekLabel}）</button></div>`:'' }
      <div class="submit-form">${fieldsHtml}</div>
      ${!isViewer?`<div style="display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #f1f5f9">
        <button class="btn btn-secondary" onclick="saveSubmission('draft','${wi.weekNo}','${wi.start}','${wi.end}','${wi.label}')">💾 保存草稿</button>
        <button class="btn btn-primary" onclick="saveSubmission('submitted','${wi.weekNo}','${wi.start}','${wi.end}','${wi.label}')">✅ 正式提交</button>
        ${existing?`<span style="font-size:12px;color:#94a3b8;align-self:center">上次更新：${existing.updatedAt.slice(0,16).replace('T',' ')}</span>`:''}

}

function copyLastWeek(subId) {
  const sub = state.submissions.find(s=>s.id===subId);
  if (!sub) return;
  const template = state.templates.find(t=>t.id===sub.templateId);
  if (!template) return;
  template.fields.forEach(f => {
    const el = document.getElementById('sf_'+f.id);
    if (el && sub.data[f.id] !== undefined) el.value = sub.data[f.id];
  });
  toast('已复制上周数据，请核对后提交','success');
}

function saveSubmission(status, weekNo, weekStart, weekEnd, weekLabel) {
  const u = currentUser();
  const template = state.templates.find(t=>t.status==='active'&&t.sections.includes(subSectionId));
  if (!template) return;

  const data = {};
  let missingRequired = false;
  template.fields.forEach(f => {
    const el = document.getElementById('sf_'+f.id);
    if (el) {
      data[f.id] = el.value.trim();
      if (f.required && !data[f.id] && status==='submitted') missingRequired = true;
    }
  });

  if (missingRequired) { toast('请填写所有必填项（标*字段）','error'); return; }

  const existing = state.submissions.find(s=>s.weekNo===weekNo&&s.sectionId===subSectionId);
  if (existing) {
    existing.status = status; existing.data = data; existing.updatedAt = new Date().toISOString();
  } else {
    state.submissions.push({id:'sub'+Date.now(),weekNo,weekLabel,weekStart,weekEnd,sectionId:subSectionId,templateId:template.id,userId:u.id,status,data,updatedAt:new Date().toISOString()});
  }

  addLog(u.id, status==='submitted'?'提交周报':'保存草稿', `${state.sections.find(s=>s.id===subSectionId)?.name} ${weekLabel}`);
  saveState(state);
  toast(status==='submitted'?'提交成功 ✅':'草稿已保存','success');
  renderSubForm(getWeekInfo(subWeekOffset));
}

// Drag state for field builder
let _dragType = null;   // 'palette' | 'reorder'
let _dragPayload = null; // field type string | field id

const FIELD_TYPE_META = {
  number:  {label:'数字',   icon:'123', bg:'#dcfce7', color:'#16a34a'},
  text:    {label:'文本',   icon:'Aa',  bg:'#e0f2fe', color:'#0369a1'},
  textarea:{label:'多行文本',icon:'≡',  bg:'#f5f3ff', color:'#7c3aed'},
  select:  {label:'下拉选择',icon:'▾', bg:'#fff7ed', color:'#c2410c'},
  date:    {label:'日期',   icon:'📅', bg:'#fce7f3', color:'#be185d'},
};

function renderTemplateEditor(el) {
  const t = state.templates.find(t=>t.id===editingTemplateId);

      <button class="btn btn-secondary btn-sm" onclick="editingTemplateId=null;renderView()">← 返回</button>
      <div><h2>${t.name} · 字段配置</h2><p>${t.version} · <span id="fieldCountLabel">${fields.length}</span> 个字段</p></div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:190px 1fr;gap:16px;align-items:start">
    <div class="card" style="position:sticky;top:72px">
      <div class="card-header"><span class="card-title">字段类型</span></div>
      <div class="card-body" style="padding:12px 14px">
        <p style="font-size:12px;color:#94a3b8;margin-bottom:10px;line-height:1.5">拖拽到右侧添加字段</p>
        ${Object.entries(FIELD_TYPE_META).map(([tp,m])=>`
          <div class="palette-chip" draggable="true"
            ondragstart="paletteDragStart(event,'${tp}')"
            style="background:${m.bg};color:${m.color}">
            <span class="palette-chip-icon">${m.icon}</span>${m.label}
          </div>`).join('')}

        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">字段画布</span>
        <span style="font-size:12px;color:#94a3b8">拖拽手柄 ⠿ 可调整顺序</span>
      </div>
      <div class="card-body" style="padding:14px">
        <div id="fieldCanvas" class="field-canvas"
          ondragover="canvasDragOver(event)"
          ondrop="canvasDrop(event,'${t.id}')"
          ondragleave="canvasDragLeave(event)">
          ${fields.length===0
            ? `<div class="canvas-empty" id="canvasEmpty"><div style="font-size:26px;margin-bottom:8px">⬅️</div><p>从左侧拖拽字段类型到这里</p></div>`
            : fields.map(f=>buildFieldRow(t.id, f)).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function buildFieldRow(tid, f) {
  const m = FIELD_TYPE_META[f.type] || {label:f.type,color:'#64748b',bg:'#f1f5f9'};
  return `<div class="field-row" draggable="true" data-fid="${f.id}"
    ondragstart="fieldDragStart(event,'${f.id}')"
    ondragover="fieldDragOver(event,'${f.id}')"
    ondrop="fieldDrop(event,'${tid}','${f.id}')"
    ondragleave="fieldDragLeave(event)"
    ondragend="fieldDragEnd(event)">
    <span class="field-drag-handle" title="拖拽排序">⠿</span>
    <span class="field-row-type" style="color:${m.color};background:${m.bg};border-color:${m.color}22">${m.label}</span>
    <input class="field-name-input" value="${f.name.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}"
      title="点击编辑字段名"
      onblur="saveFieldName('${tid}','${f.id}',this.value)"
      onkeydown="if(event.key==='Enter'){this.blur();event.preventDefault()}">
    <button class="req-toggle ${f.required?'req-on':''}"
      onclick="toggleFieldRequired('${tid}','${f.id}')"
      title="${f.required?'必填 — 点击改为选填':'选填 — 点击改为必填'}">
      ${f.required?'★ 必填':'☆ 选填'}
    </button>
    ${f.type==='select'
      ? `<button class="btn btn-secondary btn-sm" onclick="editFieldOptions('${tid}','${f.id}')" title="配置下拉选项">选项…</button>`
      : ''}
    <button class="btn btn-danger btn-sm" onclick="deleteField('${tid}','${f.id}')" title="删除字段"
      style="padding:4px 8px;font-size:14px;line-height:1">×</button>
  </div>`;
}

// ---- Palette drag ----
function paletteDragStart(e, type) {
  _dragType = 'palette';
  _dragPayload = type;
  e.dataTransfer.effectAllowed = 'copy';
}

// ---- Canvas drop zone ----
function canvasDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = _dragType==='palette' ? 'copy' : 'move';
  const canvas = document.getElementById('fieldCanvas');
  if (canvas && _dragType==='palette') canvas.classList.add('drag-active');
}
function canvasDragLeave(e) {
  // Only remove highlight if leaving the canvas itself, not a child
  const canvas = document.getElementById('fieldCanvas');
  if (canvas && !canvas.contains(e.relatedTarget)) canvas.classList.remove('drag-active');
}
function canvasDrop(e, tid) {
  e.preventDefault();
  const canvas = document.getElementById('fieldCanvas');
  if (canvas) canvas.classList.remove('drag-active');
  if (_dragType !== 'palette') return;
  const type = _dragPayload;
  _dragType = null; _dragPayload = null;
  addFieldByDrop(tid, type, null); // null = append to end
}

// ---- Field row drag (reorder) ----
function fieldDragStart(e, fid) {
  _dragType = 'reorder';
  _dragPayload = fid;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { const el = document.querySelector(`[data-fid="${fid}"]`); if(el) el.classList.add('dragging'); }, 0);
}
function fieldDragOver(e, fid) {
  e.preventDefault();
  e.stopPropagation();
  if (_dragType==='reorder' && fid===_dragPayload) return;
  document.querySelectorAll('.field-row').forEach(el=>el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
  // Remove canvas highlight when over a specific field
  const canvas = document.getElementById('fieldCanvas');
  if (canvas) canvas.classList.remove('drag-active');
}
function fieldDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function fieldDragEnd(e) {
  document.querySelectorAll('.field-row').forEach(el=>{ el.classList.remove('dragging'); el.classList.remove('drag-over'); });
  const canvas = document.getElementById('fieldCanvas');
  if (canvas) canvas.classList.remove('drag-active');
  _dragType = null; _dragPayload = null;
}
function fieldDrop(e, tid, targetFid) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.field-row').forEach(el=>el.classList.remove('drag-over'));
  const type = _dragType, payload = _dragPayload;
  _dragType = null; _dragPayload = null;

  const t = state.templates.find(t=>t.id===tid);
  if (!t) return;

  if (type==='palette') {
    // Insert new field before the target
    addFieldByDrop(tid, payload, targetFid);
  } else if (type==='reorder' && payload !== targetFid) {
    // Reorder: insert src before target
    const fields = [...t.fields].sort((a,b)=>a.order-b.order);
    const srcIdx = fields.findIndex(f=>f.id===payload);
    const tgtIdx = fields.findIndex(f=>f.id===targetFid);
    if (srcIdx<0||tgtIdx<0) return;
    const [moved] = fields.splice(srcIdx,1);
    fields.splice(tgtIdx,0,moved);
    fields.forEach((f,i) => f.order=i+1);
    saveState(state);
    renderTemplateEditor(document.getElementById('appContent'));
  }
}

function addFieldByDrop(tid, type, beforeFid) {
  const t = state.templates.find(t=>t.id===tid);
  if (!t) return;
  const defaultNames = {number:'新数字字段',text:'新文本字段',textarea:'新多行字段',select:'新下拉字段',date:'新日期字段'};
  const fields = [...t.fields].sort((a,b)=>a.order-b.order);
  const newField = {id:'f'+Date.now(), name:defaultNames[type]||'新字段', type, required:false, order:0, hint:'', options:''};

  if (beforeFid) {
    const tgtIdx = fields.findIndex(f=>f.id===beforeFid);
    fields.splice(tgtIdx, 0, newField);
  } else {
    fields.push(newField);
  }
  fields.forEach((f,i)=>f.order=i+1);
  // Replace template fields
  if (!t.fields.find(f=>f.id===newField.id)) t.fields.push(newField);
  else t.fields.forEach(f=>{ const m=fields.find(x=>x.id===f.id); if(m) f.order=m.order; });
  newField.order = fields.find(f=>f.id===newField.id)?.order || t.fields.length;

  saveState(state);
  renderTemplateEditor(document.getElementById('appContent'));
  // Auto-focus the new field's name input
  setTimeout(()=>{
    const input = document.querySelector(`[data-fid="${newField.id}"] .field-name-input`);
    if (input) { input.focus(); input.select(); }
  }, 50);
  toast(`已添加${FIELD_TYPE_META[type]?.label||type}字段，请输入字段名`, 'success');
}

// ---- Inline field editing ----
function saveFieldName(tid, fid, value) {
  const t = state.templates.find(t=>t.id===tid);
  const f = t?.fields.find(f=>f.id===fid);
  if (!f) return;
  const newName = value.trim();
  if (!newName) {
    // Restore old value
    const input = document.querySelector(`[data-fid="${fid}"] .field-name-input`);
    if (input) input.value = f.name;
    toast('字段名不能为空','error'); return;
  }
  if (f.name !== newName) { f.name = newName; saveState(state); }
}

function toggleFieldRequired(tid, fid) {
  const t = state.templates.find(t=>t.id===tid);
  const f = t?.fields.find(f=>f.id===fid);
  if (!f) return;
  f.required = !f.required;
  saveState(state);
  // Update just the button, no full re-render needed
  const row = document.querySelector(`[data-fid="${fid}"]`);
  if (row) {
    const btn = row.querySelector('.req-toggle');
    if (btn) {
      btn.className = `req-toggle ${f.required?'req-on':''}`;
      btn.title = f.required?'必填 — 点击改为选填':'选填 — 点击改为必填';
      btn.textContent = f.required?'★ 必填':'☆ 选填';
    }
  }
}

function editFieldOptions(tid, fid) {
  const t = state.templates.find(t=>t.id===tid);
  const f = t?.fields.find(f=>f.id===fid);
  if (!f) return;
  showModal('配置下拉选项 · '+f.name, `
  <p style="font-size:13px;color:#64748b;margin-bottom:12px">每行一个选项，或用英文逗号分隔</p>
  <div class="form-group">
    <textarea class="form-control" id="opt_textarea" style="min-height:140px;font-size:13px">${(f.options||'').split(',').filter(Boolean).join('\n')}</textarea>
  </div>`, '', '', id=>{
    document.getElementById(id).querySelector('.modal').insertAdjacentHTML('beforeend',
      `<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('${id}')">取消</button><button class="btn btn-primary" onclick="doSaveOptions('${tid}','${fid}','${id}')">保存</button></div>`);
  });
}

function doSaveOptions(tid, fid, mid) {
  const t = state.templates.find(t=>t.id===tid);
  const f = t?.fields.find(f=>f.id===fid);
  if (!f) return;
  const raw = document.getElementById('opt_textarea')?.value || '';
  // Support both newline and comma-separated
  f.options = raw.split(/[\n,]/).map(s=>s.trim()).filter(Boolean).join(',');
  saveState(state);
  closeModal(mid);
  toast(`已保存 ${f.options.split(',').length} 个选项`, 'success');
}

function deleteField(tid, fid) {
  const t = state.templates.find(t=>t.id===tid);
  if (!t||!confirm('确定删除此字段？已填报的数据不受影响。')) return;
  t.fields = t.fields.filter(f=>f.id!==fid);
  saveState(state);
  renderTemplateEditor(document.getElementById('appContent'));
  toast('字段已删除','warning');
}

function generateReport() {
  const tid = document.getElementById('rpt_tpl')?.value;
  const wStart = document.getElementById('rpt_week_start')?.value;
  const wEnd = document.getElementById('rpt_week_end')?.value;
  const selSecs = [...document.querySelectorAll('input[name="rpt_sec"]:checked')].map(e=>e.value);

  if (!tid) { toast('请选择数据模板','error'); return; }
  if (!wStart||!wEnd) { toast('请选择周次范围','error'); return; }
  if (wStart > wEnd) { toast('起始周次不能晚于结束周次','error'); return; }
  if (!selSecs.length) { toast('请至少选择一个板块','error'); return; }

  const t = state.templates.find(t=>t.id===tid);
  const subs = state.submissions.filter(s =>
    s.templateId===tid && s.status==='submitted' &&
    selSecs.includes(s.sectionId) && s.weekNo>=wStart && s.weekNo<=wEnd
  );

  const allWeeks = [...new Set(subs.map(s=>s.weekNo))].sort();
  const wiStart = getWeekInfoFromNo(wStart);
  const wiEnd = getWeekInfoFromNo(wEnd);
  const fields = [...t.fields].sort((a,b)=>a.order-b.order);
  const now = new Date().toLocaleString('zh-CN');
  const multiSection = selSecs.length > 1;

  let reportHtml = '';

  if (!multiSection) {
    // 单板块：行 = 周次，列 = 字段
    const secId = selSecs[0];
    const sec = state.sections.find(s=>s.id===secId);
    const secSubs = subs.filter(s=>s.sectionId===secId).sort((a,b)=>a.weekNo.localeCompare(b.weekNo));
    if (secSubs.length) {
      reportHtml += `<h2>${sec?.name}</h2>`;
      const rows = secSubs.map(sub => {
        const cols = fields.map(f=>`<td>${sub.data[f.id]||'-'}</td>`).join('');
        return `<tr><td><strong>${sub.weekLabel}</strong></td>${cols}</tr>`;
      }).join('');
      reportHtml += `<table class="data-table">
        <thead><tr><th>周次</th>${fields.map(f=>`<th>${f.name}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }
  } else {
    // 多板块：按周次分组，每个板块为一列，行 = 字段
    const secObjs = selSecs.map(id=>state.sections.find(s=>s.id===id)).filter(Boolean);

    if (allWeeks.length === 0) {
      reportHtml = '';
    } else {
      allWeeks.forEach(wk => {
        const wi = getWeekInfoFromNo(wk);
        reportHtml += `<h2>${wi.label}</h2>`;
        const rows = fields.map(f => {
          const cells = secObjs.map(sec => {
            const sub = subs.find(s=>s.sectionId===sec.id && s.weekNo===wk);
            const val = sub ? (sub.data[f.id]||'') : '';
            return `<td>${val||'-'}</td>`;
          }).join('');
          return `<tr><td><strong>${f.name}</strong></td>${cells}</tr>`;
        }).join('');
        reportHtml += `<table class="data-table">
          <thead><tr>
            <th style="min-width:140px">数据项</th>
            ${secObjs.map(s=>`<th>${s.name}</th>`).join('')}
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      });
    }
  }

  if (!reportHtml) reportHtml = '<p style="color:#94a3b8;text-align:center;padding:20px">所选范围内暂无已提交的数据</p>';

  const fullReport = `
  <h1>HR 数据报告</h1>
  <div class="report-meta">
    数据范围：${wiStart.label} 至 ${wiEnd.label} &nbsp;|&nbsp;
    板块：${selSecs.map(id=>state.sections.find(s=>s.id===id)?.name).filter(Boolean).join('、')} &nbsp;|&nbsp;
    模板：${t.name} ${t.version}<br>
    生成时间：${now}
  </div>
  ${reportHtml}
  <div class="report-footer">本报告由 HR 报告平台自动生成 · ${now}</div>`;

  const previewArea = document.getElementById('rptPreviewArea');
  previewArea.innerHTML = `
  <div class="card">
    <div class="card-header">
      <span class="card-title">报告预览</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="printReport()">🖨️ 打印/保存PDF</button>
        <button class="btn btn-secondary btn-sm" onclick="demoSendEmail()">📧 演示发送邮件</button>
      </div>
    </div>
    <div class="report-preview">
      <div class="report-a4" id="reportContent">${fullReport}</div>
    </div>
  </div>`;

  addLog(currentUserId,'生成报告',`${wiStart.label}-${wiEnd.label}`);
  saveState(state);
  toast('报告已生成','success');
}

}
